      const dx = this.panStart.x - pos.x;
      const dy = this.panStart.y - pos.y;
      this.camera.x += dx;
      this.camera.y += dy;
      this.panStart = { x: pos.x, y: pos.y };
      this.clampCamera();
      this.render();
      return;
    }
    if (this.dragStart) {
      this.dragCurrent = pos;
      if ((this.mode === 'supply' || this.mode === 'wire') && this.supplyDragPoints) {
        this.supplyDragPoints.push({ ...this.dragCurrent });
      }
      this.render();
    }
  }

  onMouseUp(e) {
    if (this._edit) { this._editPointerUp(this.getMousePos(e)); return; }
    // 皇帝放置模式：没有拖拽则触发点击
    if (this._emperorDragStart && this._emperorClickHandler) {
      const pos = this._emperorDragStart;
      this._emperorDragStart = null;
      this._emperorClickHandler(pos);
      return;
    }
    if (this.isPanning) {
      this.isPanning = false;
      this.canvas.style.cursor = 'crosshair';
      return;
    }
    if (!this.dragStart || !this.dragCurrent) return;
    if (this.mode === 'supply') {
      this.finishSupplyDrag();
    } else if (this.mode === 'wire') {
      this.finishWireDrag();
    } else {
      this.finishTroopDeploy();
    }
  }

  onWheel(e) {
    e.preventDefault();
    const oldZoom = this.camera.zoom;
    const delta = e.deltaY > 0 ? -0.12 : 0.12;
    const newZoom = Math.max(0.15, Math.min(3, oldZoom + delta));
    // 以屏幕中心为锚点缩放，画面不漂移
    const cx = CONFIG.MAP_W / 2, cy = CONFIG.MAP_H / 2;
    this.camera.x = cx / oldZoom + this.camera.x - cx / newZoom;
    this.camera.y = cy / oldZoom + this.camera.y - cy / newZoom;
    this.camera.zoom = newZoom;
    this.clampCamera();
    this.render();
  }

  clampCamera() {
    const z = this.camera.zoom;
    const vw = CONFIG.MAP_W / z, vh = CONFIG.MAP_H / z;
    this.camera.x = Math.max(0, Math.min(CONFIG.MAP_W - vw, this.camera.x));
    this.camera.y = Math.max(0, Math.min(CONFIG.MAP_H - vh, this.camera.y));
  }

  updateEmperorPrompt() {
    if (this.setupPlayer < CONFIG.PLAYERS) {
      document.getElementById('emperorText').textContent =
        `玩家 ${this.setupPlayer + 1} (${CONFIG.COLOR_NAMES[this.setupPlayer]}) - 请点击一座空城放置皇帝`;
      document.getElementById('emperorTitle').style.color = CONFIG.COLORS[this.setupPlayer];
    }
  }

  handleSetupClick(pos) {
    let clicked = false;
    for (const city of this.cities) {
      if (distToPoint(pos.x, pos.y, city.x, city.y) < 35) {
        if (city.owner !== null) {
          this.setActionText('这座城池已被占用，请选择空城（灰色）');
          return;
        }
        city.owner = this.setupPlayer;
        city.hp = 5;
        city.hasEmperor = true;
        this.players[this.setupPlayer].emperorCityId = city.id;
        this.players[this.setupPlayer].cities.push(city.id);
        this.setActionText(`${CONFIG.COLOR_NAMES[this.setupPlayer]} 皇帝放置成功！`);

        this.setupPlayer++;
        if (this.setupPlayer >= CONFIG.PLAYERS) {
          document.getElementById('emperorPrompt').style.display = 'none';
          this.state = 'playing';
          this.updateUI();
          // AI模式：第一个如果是AI则自动开始
          if (this.gameMode === 'ai' && !this.players[0].isHuman) {
            setTimeout(() => this.startAITurn(), 800);
          }
        } else {
          this.updateEmperorPrompt();
          // AI模式：下一个setup玩家是AI则自动
          if (this.gameMode === 'ai' && !this.players[this.setupPlayer].isHuman) {
            setTimeout(() => this.aiAutoSetup(), 500);
          }
        }
        this.render();
        clicked = true;
        break;
      }
    }
    if (!clicked) {
      this.setActionText('请点击空城放置皇帝（灰色城池）');
    }
  }

  handleLeftClick(pos) {
    if (!this.mode) {
      this.selectedCity = null;
      this.selectedBuilding = null;
      for (const city of this.cities) {
        if (distToPoint(pos.x, pos.y, city.x, city.y) < 30) {
          this.selectedCity = city;
          break;
        }
      }
      this.render();
      return;
    }

    switch (this.mode) {
      case 'factory': this.tryBuildFactory(pos); break;
      case 'rope': this.tryBuildRope(pos); break;
      case 'dock': this.tryBuildDock(pos); break;
      case 'ship': this.tryBuildShip(pos); break;
      case 'cannon': this.tryBuildCannon(pos); break;
      case 'cavalry': this.tryPlaceCavalry(pos); break;
      case 'supply': this.setActionText('长按右键从城池画到兵线'); break;
      case 'moveEmperor': this.tryMoveEmperor(pos); break;
      case 'burnRope': this.tryBurnRope(pos); break;
      case 'attack': this.tryCannonAttack(pos); break;
    }
  }

  startTroopDeploy(pos) {
    if (this.state !== 'playing') return;
    let origin = null, originType = null, originTroopId = null, isTroopEnd = false;

    // 检查城池
    for (const city of this.cities) {
      if (city.owner === this.currentPlayer && distToPoint(pos.x, pos.y, city.x, city.y) < 35) {
        origin = city; originType = 'city'; break;
      }
    }

    // 检查工厂
    if (!origin) {
      for (const f of this.factories) {
        if (f.owner === this.currentPlayer && distToPoint(pos.x, pos.y, f.x, f.y) < 30) {
          origin = f; originType = 'factory'; break;
        }
      }
    }

    // 检查船（点击船身或出兵圆点均可）
    if (!origin) {
      for (const s of this.ships) {
        const sx = s.spawnX || s.x, sy = s.spawnY || s.y;
        if (s.owner === this.currentPlayer && distToPoint(pos.x, pos.y, sx, sy) < 25) {
          origin = { x: sx, y: sy, id: s.id, shipRef: s };
          originType = 'ship'; break;
        }
      }
    }

    // 检查骑兵单位的出兵圆点
    if (!origin) {
      for (const cv of this.cavalryUnits) {
        if (cv.owner === this.currentPlayer && distToPoint(pos.x, pos.y, cv.spawnX, cv.spawnY) < 20) {
          if (cv.hasTroop) {
            this.setActionText('该骑兵已经出兵了');
            return;
          }
          origin = { x: cv.spawnX, y: cv.spawnY, id: cv.id };
          originType = 'cavalryUnit';
          break;
        }
      }
    }

    // 检查兵线（用于延伸/分支）
    if (!origin) {
      for (const troop of this.troops) {
        if (troop.owner !== this.currentPlayer) continue;
        // 骑兵兵线只能被自身检测（自身可延伸，但不能从骑兵兵线分叉）
        for (let i = 0; i < troop.points.length; i++) {
          if (distToPoint(pos.x, pos.y, troop.points[i].x, troop.points[i].y) < 15) {
            origin = { x: troop.points[i].x, y: troop.points[i].y };
            originType = 'troop';
            originTroopId = troop.id;
            isTroopEnd = (i === troop.points.length - 1);
            break;
          }
        }
        if (origin) break;
      }
    }

    if (origin) {
      if (originType === 'ship') {
        const shipRef = origin.shipRef || origin;
        const hasTroop = this.troops.some(t => t.shipId === shipRef.id && t.owner === this.currentPlayer);
        if (hasTroop) { this.setActionText('这艘船已经有兵线在运输了'); return; }
      }
      this.dragStart = { x: origin.x, y: origin.y, origin, originType, originTroopId, isTroopEnd };
      this.dragCurrent = pos;
    } else {
      const hint = this.isMobile ? '长按' : '右键';
      this.setActionText(`请${hint}点击我方城池、工厂、船、骑兵圆点或兵线`);
    }
  }

  finishTroopDeploy() {
    if (!this.dragStart || !this.dragCurrent) { this.dragStart = null; this.dragCurrent = null; return false; }
    const start = this.dragStart;
    const end = this.dragCurrent;
    const dx = end.x - start.x, dy = end.y - start.y;
    const length = Math.hypot(dx, dy);
    const MAX_LEN = 250;
    let maxLen = Math.min(length, MAX_LEN);
    if (maxLen < 20) {
      if (this.aiThinking) this.aiLog('err', `出兵线长度太短(${Math.round(maxLen)}px)，取消`);
      this.dragStart = null; this.dragCurrent = null; this.render(); return false;
    }

    // 拉弓式出兵：射击方向 = 拖拽反方向
    let shootAngle = Math.atan2(dy, dx) + Math.PI;

    // 40% 概率：方向偏离 3-20°，距离增减 5-10
    if (Math.random() < 0.4) {
      const angleDev = (3 + Math.random() * 17) * Math.PI / 180; // 3-20° 转弧度
      shootAngle += Math.random() < 0.5 ? angleDev : -angleDev;
      const lenMod = (5 + Math.random() * 5) * (Math.random() < 0.5 ? 1 : -1); // ±5-10
      maxLen = Math.max(20, Math.min(MAX_LEN, maxLen + lenMod));
    }

    let destX = start.x + Math.cos(shootAngle) * maxLen;
    let destY = start.y + Math.sin(shootAngle) * maxLen;

    const isEndExtend = (start.originType === 'troop' && start.isTroopEnd);
    let targetTroop = null;

    if (isEndExtend) {
      targetTroop = this.troops.find(t => t.id === start.originTroopId);
      if (!targetTroop) { this.dragStart = null; this.dragCurrent = null; this.render(); return false; }
      const currentSegments = targetTroop.segCount || (targetTroop.points.length - 1);
      if (currentSegments >= targetTroop.maxSegments) {
        this.setActionText(`这条兵线已有${currentSegments}段，上限${targetTroop.maxSegments}段，需续粮才能延伸`);
        if (this.aiThinking) this.aiLog('err', `兵线${currentSegments}段已满，取消`);
        this.dragStart = null; this.dragCurrent = null; this.render(); return false;
      }
    } else {
      let allowedMaxSegments = CONFIG.SUPPLY_SEGMENTS;
      if (start.originTroopId !== null && start.originTroopId !== undefined) {
        const parentTroop = this.troops.find(t => t.id === start.originTroopId);
        if (parentTroop) {
          if (parentTroop.type === 'cavalry') {
            this.setActionText('骑兵兵线不能分叉');
            if (this.aiThinking) this.aiLog('err', '骑兵兵线不能分叉，取消');
            this.dragStart = null; this.dragCurrent = null; this.render(); return false;
          }
          allowedMaxSegments = parentTroop.maxSegments;
        }
      }
      if (allowedMaxSegments <= 0) {
        this.setActionText('兵线段数已满，需续粮才能延伸');
        if (this.aiThinking) this.aiLog('err', '兵线段数已满，取消');
        this.dragStart = null; this.dragCurrent = null; this.render(); return false;
      }
    }

    let points = [{ x: start.x, y: start.y }, { x: destX, y: destY }];

    // 山体检测
    let valid = true;
    for (let i = 0; i < points.length - 1 && valid; i++) {
      for (const mtn of this.mountains) {
        if (this.lineCrossesMountain(points[i], points[i+1], mtn)) {
          if (!mtn.hasRope) {
            valid = false;
            this.setActionText('兵线不能横穿山体！修建绳子或顺坡而行');
            break;
          }
        }
      }
    }
    if (!valid) {
      if (this.aiThinking) this.aiLog('err', '兵线被山体阻挡，取消');
      this.dragStart = null; this.dragCurrent = null; this.render(); return false;
    }

    // 河流处理：水军（shipId存在）可从河上岸，不拦
    const isShipTroop = start.originType === 'ship' || (targetTroop && targetTroop.shipId != null);
    if (!isShipTroop) {
      for (const river of this.rivers) {
        if (this.lineCrossesRiver(points[0], points[1], river)) {
          // 检查是否经过桥
          let crossedBridge = false;
          for (const br of river.bridges) {
            // 兵线端点离桥25px以内，视为从桥上过
            if (Math.hypot(destX - br.x, destY - br.y) < 50 ||
                Math.hypot(points[0].x - br.x, points[0].y - br.y) < 50 ||
                lineCircleMinDist(points[0].x, points[0].y, destX, destY, br.x, br.y) < 40) {
              crossedBridge = true;
              break;
            }
          }
          if (!crossedBridge) {
            this.setActionText('兵线不能穿过河流！请从桥上通过');
            if (this.aiThinking) this.aiLog('err', '兵线试图穿河，取消');
            this.dragStart = null; this.dragCurrent = null; this.render(); return false;
          }
        }
      }
    }

    if (isEndExtend) {
      targetTroop.points.push({ x: destX, y: destY });
      targetTroop.segCount = (targetTroop.segCount || (targetTroop.points.length - 2)) + 1;
    } else {
      let originId = null;
      if (start.originTroopId !== null && start.originTroopId !== undefined) {
        originId = start.originTroopId;
      } else if (start.origin && start.origin.id !== undefined) {
        originId = start.origin.id;
      }

      let allowedMaxSegments = CONFIG.SUPPLY_SEGMENTS;
      if (start.originTroopId !== null && start.originTroopId !== undefined) {
        const parentTroop = this.troops.find(t => t.id === start.originTroopId);
        if (parentTroop) allowedMaxSegments = parentTroop.maxSegments;
      }

      const isCavalry = start.originType === 'cavalryUnit';

      // 城池最多出3条兵线
      if (start.originType === 'city' && start.origin && start.origin.id !== undefined) {
        const cityTroops = this.troops.filter(t => t.originId === start.origin.id && t.originType === 'city' && t.hp > 0);
        if (cityTroops.length >= 3) {
          this.setActionText('此城池已出兵3条，无法再从该城出兵');
          if (this.aiThinking) this.aiLog('err', '城池' + start.origin.id + '已满3条兵线，取消');
          this.dragStart = null; this.dragCurrent = null; this.render(); return false;
        }
      }
      targetTroop = {
        id: this.troops.length, owner: this.currentPlayer,
        points, hp: isCavalry ? CONFIG.CAVALRY_HP : CONFIG.TROOP_HP,
        atk: isCavalry ? CONFIG.CAVALRY_ATK : CONFIG.TROOP_ATK,
        type: isCavalry ? 'cavalry' : 'basic',
        originId: originId, originType: start.originType,
        shipId: start.originType === 'ship' ? (start.origin.shipRef ? start.origin.shipRef.id : start.origin.id) : null,
        maxSegments: allowedMaxSegments, supplyExtended: false,
        segCount: 1
      };
      this.troops.push(targetTroop);

      if (isCavalry && start.origin && start.origin.id !== undefined) {
        const cv = this.cavalryUnits.find(c => c.id === start.origin.id);
        if (cv) cv.hasTroop = true;
      }
    }

    // 统一攻击碰撞检测
    this.resolveTroopAttack(targetTroop);

    this.checkCombat();
    this.dragStart = null;
    this.dragCurrent = null;
    if (!this.aiThinking && !this._isRemoteAction) this.autoNextTurn();
    return true;
  }

  _onlineEndTurn() {
    this.troops = this.troops.filter(t => t.hp > 0);
    this.combatEvents = [];
    this.checkWinCondition();
    if (this.state === 'gameover') return;
    this.currentPlayer = (this.currentPlayer + 1) % CONFIG.PLAYERS;
    if (this.currentPlayer === 0) this.turn++;
    while (!this.players[this.currentPlayer].alive) {
      this.currentPlayer = (this.currentPlayer + 1) % CONFIG.PLAYERS;
      if (this.currentPlayer === 0) this.turn++;
    }
    // 发送完整状态（主机 relay 给其他人；加入者发给主机 relay）
    this.network.send({
      type: 'full_state',
      state: this._serializeState(),
      currentPlayer: this.currentPlayer,
      turn: this.turn
    });
    this._syncTurnState();
    this.setMode(null); this.render();
  }

  _serializeState() {
    return {
      cities: this.cities.map(c => ({ id: c.id, owner: c.owner, hp: c.hp, hasEmperor: c.hasEmperor, x: c.x, y: c.y, isMountainCity: c.isMountainCity || false, mountainId: c.mountainId || undefined })),
      troops: this.troops.map(t => ({ id: t.id, owner: t.owner, points: t.points, hp: t.hp, atk: t.atk, type: t.type, originType: t.originType, originId: t.originId, maxSegments: t.maxSegments, segCount: t.segCount, supplyExtended: t.supplyExtended, shipId: t.shipId })),
      factories: this.factories.map(f => ({ id: f.id, cityId: f.cityId, x: f.x, y: f.y, owner: f.owner, hp: f.hp })),
      cannons: this.cannons.map(c => ({ id: c.id, x: c.x, y: c.y, owner: c.owner, hp: c.hp })),
      cavalryUnits: this.cavalryUnits.map(c => ({ id: c.id, x: c.x, y: c.y, spawnX: c.spawnX, spawnY: c.spawnY, owner: c.owner, hp: c.hp, hasTroop: c.hasTroop })),
      docks: this.docks.map(d => ({ id: d.id, x: d.x, y: d.y, owner: d.owner, riverId: d.riverId })),
      ships: this.ships.map(s => ({ id: s.id, dockId: s.dockId, x: s.x, y: s.y, owner: s.owner, spawnX: s.spawnX, spawnY: s.spawnY })),
      wires: this.wires.map(w => ({ id: w.id, factoryId: w.factoryId, cannonId: w.cannonId, owner: w.owner, points: w.points, hp: w.hp })),
      supplyLines: this.supplyLines.map(s => ({ id: s.id, owner: s.owner, troopId: s.troopId, cityId: s.cityId, points: s.points, hp: s.hp })),
      mountains: this.mountains.map(m => ({ id: m.id, hasRope: m.hasRope, ropeOwner: m.ropeOwner })),
      players: this.players.map(p => ({ alive: p.alive, isHuman: p.isHuman, emperorCityId: p.emperorCityId, cities: p.cities, factories: p.factories }))
    };
  }

  _applyState(state) {
    // 正确恢复城市：用 state 中保存的 x/y，不再从 this.cities 索引读取
    this.cities = state.cities.map(c => ({
      id: c.id, owner: c.owner, hp: c.hp, hasEmperor: c.hasEmperor,
      x: c.x, y: c.y,
      isMountainCity: c.isMountainCity || false,
      mountainId: c.mountainId || undefined
    }));
    this.troops = state.troops;
    this.factories = state.factories;
    this.cannons = state.cannons;
    this.cavalryUnits = state.cavalryUnits;
    this.docks = state.docks;
    this.ships = state.ships;
    this.wires = state.wires;
    this.supplyLines = state.supplyLines;
    this.combatEvents = [];
    this.aiHighlightTarget = null;
    for (const m of state.mountains) {
      if (this.mountains[m.id]) {
        this.mountains[m.id].hasRope = m.hasRope;
        this.mountains[m.id].ropeOwner = m.ropeOwner;
      }
    }
    // 正确恢复玩家数据：cities/factories 是数字数组（城市/工厂ID列表）
    this.players = this.players.map((p, i) => ({
      ...p,
      alive: state.players[i].alive,
      isHuman: state.players[i].isHuman,
      emperorCityId: state.players[i].emperorCityId,
      cities: state.players[i].cities || [],
      factories: state.players[i].factories || []
    }));
  }

  // ============================================================
  // resolveTroopAttack - 统一处理兵线对目标的攻击判定
  // ============================================================
  resolveTroopAttack(troop) {
    const pts = troop.points;
    const CITY_R = 40;
    const CANNON_R = 30;

    let originCityId = null;
    for (const city of this.cities) {
      if (city.owner === this.currentPlayer && distToPoint(pts[0].x, pts[0].y, city.x, city.y) < CITY_R) {
        originCityId = city.id;
        break;
      }
    }

    let hitSomething = false;

    // 1. 路径攻击：线段穿过敌方城市碰撞圆
    let hitCity = false;
    let nearestCity = null, nearestDist = Infinity;
    for (const city of this.cities) {
      if (city.id === originCityId) continue;
      if (city.owner === this.currentPlayer) continue;
      if (!pathTouchesCircle(pts, city.x, city.y, CITY_R)) continue;
      let d = Infinity;
      for (let i = 0; i < pts.length - 1; i++) {
        d = Math.min(d, lineCircleMinDist(pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y, city.x, city.y));
      }
      if (d < nearestDist) {
        nearestDist = d;
        nearestCity = city;
      }
    }
    if (nearestCity) {
      hitCity = true;
      if (nearestCity.owner === null) {
        nearestCity.owner = this.currentPlayer;
        nearestCity.hp = 5;
        this.players[this.currentPlayer].cities.push(nearestCity.id);
        this.setActionText(`占领空城！城池血量: ${nearestCity.hp}`);
      } else if (nearestCity.owner !== this.currentPlayer) {
        hitSomething = true;
        const damage = Math.max(1, troop.atk);
        nearestCity.hp -= damage;
        this.setActionText(`${troop.type === 'cavalry' ? '骑兵' : '部队'}攻击${CONFIG.COLOR_NAMES[nearestCity.owner]}城池！-${damage} 剩余: ${nearestCity.hp}`);
        if (nearestCity.hp <= 0) this.captureCity(nearestCity, this.currentPlayer);
      }
    }

    // 2. 大炮攻击
    if (!hitCity) {
      for (let ci = this.cannons.length - 1; ci >= 0; ci--) {
        const c = this.cannons[ci];
        if (c.owner === this.currentPlayer) continue;
        if (pathTouchesCircle(pts, c.x, c.y, CANNON_R)) {
          hitSomething = true;
          c.hp -= troop.atk;
          if (c.hp <= 0) {
            const cannonId = c.id;
            this.cannons.splice(ci, 1);
            // 同时删除连接该大炮的引线
            this.wires = this.wires.filter(w => w.cannonId !== cannonId);
            this.setActionText('摧毁敌方大炮及引线！');
          } else {
            this.setActionText(`攻击敌方大炮！剩余血量: ${c.hp}`);
          }
          break;
        }
      }
    }

    // 3. 粮线判断（不受hitSomething限制，独立检测）
    for (let si = this.supplyLines.length - 1; si >= 0; si--) {
      const sl = this.supplyLines[si];
      if (sl.owner === this.currentPlayer) continue;
      if (this.pathCrossesLines(pts, sl.points, 30)) {
        hitSomething = true;
        sl.hp -= troop.atk;
        if (sl.hp <= 0) {
          this.supplyLines.splice(si, 1);
          this.setActionText('切断敌方粮线！');
          } else {
            this.setActionText(`攻击粮线！剩余血量: ${sl.hp}`);
          }
          break;
        }
    }

    // 4. 引线判断（独立检测，不受hitSomething影响）
    // 使用波浪线采样点进行碰撞检测（与视觉一致）
    for (let wi = this.wires.length - 1; wi >= 0; wi--) {
      const w = this.wires[wi];
      if (w.owner === this.currentPlayer) continue;
      const wireSampled = this.getSpringLinePoints(w.points, 2, 8);
      if (wireSampled.length < 2) continue;
      if (this.pathCrossesLines(pts, wireSampled, 15)) {
        hitSomething = true;
        w.hp -= troop.atk;
        if (w.hp <= 0) {
          this.wires.splice(wi, 1);
          this.setActionText('切断敌方引线！');
        } else {
          this.setActionText(`攻击引线！剩余血量: ${w.hp}`);
        }
        break;
      }
    }

    // 5. 骑兵单位判断
    for (let ci = this.cavalryUnits.length - 1; ci >= 0; ci--) {
      const cv = this.cavalryUnits[ci];
      if (cv.owner === this.currentPlayer) continue;
      if (pathTouchesCircle(pts, cv.x, cv.y, 20)) {
        hitSomething = true;
        cv.hp -= troop.atk;
        if (cv.hp <= 0) {
          // 骑兵单位被摧毁，同时删除其所有兵线
          for (let ti = this.troops.length - 1; ti >= 0; ti--) {
            const t = this.troops[ti];
            if (t.originType === 'cavalryUnit' && t.originId === cv.id) {
              this.troops.splice(ti, 1);
            }
          }
          this.cavalryUnits.splice(ci, 1);
          this.setActionText('摧毁敌方骑兵营地！');
        } else {
          this.setActionText(`攻击骑兵营地！剩余血量: ${cv.hp}`);
        }
        break;
      }
    }

    if (hitSomething) {
      // 兵线攻击后留在场上（可继续推进或被敌方清除）
    }
  }

  // 兵线被删除时，同时清理对应的骑兵单位
  _destroyCavalryByTroop(troop) {
    if (troop.type !== 'cavalry' || troop.originType !== 'cavalryUnit') return;
    const cvIdx = this.cavalryUnits.findIndex(cv => cv.id === troop.originId);
    if (cvIdx >= 0) {
      // 检查该骑兵单位是否还有其他兵线
      const hasOtherTroops = this.troops.some(t =>
        t !== troop && t.originType === 'cavalryUnit' && t.originId === troop.originId
      );
      if (!hasOtherTroops) {
        this.cavalryUnits.splice(cvIdx, 1);
      }
    }
  }

  lineCrossesMountain(p1, p2, mtn) {
    const mpts = mtn.points;
    for (let i = 0; i < mpts.length - 1; i++) {
      if (linesIntersect(p1, p2, mpts[i], mpts[i+1])) return true;
    }
    return false;
  }

  // 检测一条折线路径是否穿过/靠近另一条折线（线段到线段距离）
  pathCrossesLines(pathPts, linePts, threshold = 30) {
    for (let i = 0; i < pathPts.length - 1; i++) {
      for (let j = 0; j < linePts.length - 1; j++) {
        const d = this.segmentToSegmentDist(
          pathPts[i].x, pathPts[i].y, pathPts[i+1].x, pathPts[i+1].y,
          linePts[j].x, linePts[j].y, linePts[j+1].x, linePts[j+1].y
        );
        if (d < threshold) return true;
      }
    }
    return false;
  }

  lineCrossesRiver(p1, p2, river) {
    const pts = getRiverPoints(river, 0.03);
    for (let i = 0; i < pts.length - 1; i++) {
      if (linesIntersect(p1, p2, pts[i], pts[i+1])) return true;
    }
    return false;
  }

  findRiverBank(p1, p2) {
    // 二分法找到线段与河流交点附近的岸边点
    let lo = 0, hi = 1;
    for (let iter = 0; iter < 10; iter++) {
      const mid = (lo + hi) / 2;
      const mx = p1.x + (p2.x - p1.x) * mid;
      const my = p1.y + (p2.y - p1.y) * mid;
      if (this.rivers.some(r => pointNearRiver(mx, my, r, 20))) {
        hi = mid;
      } else {
        lo = mid;
      }
    }
    // 停在离河稍远一点的岸边
    const t = Math.max(0, lo - 0.05);
    return { x: p1.x + (p2.x - p1.x) * t, y: p1.y + (p2.y - p1.y) * t };
  }

  checkCombat() {
    this.combatEvents = [];

    // 收集交战对（存 ref 不存 index，避免 splice 后索引错乱）
    const pairs = [];
    for (let i = 0; i < this.troops.length; i++) {
      const t1 = this.troops[i];
      if (t1.hp <= 0) continue;
      for (let j = i + 1; j < this.troops.length; j++) {
        const t2 = this.troops[j];
        if (t2.hp <= 0 || t1.owner === t2.owner) continue;

        let intersectPt = null;
        let minDist = Infinity;
        let found = false;
        for (let a = 0; a < t1.points.length - 1 && !found; a++) {
          for (let b = 0; b < t2.points.length - 1 && !found; b++) {
            if (linesIntersect(t1.points[a], t1.points[a+1], t2.points[b], t2.points[b+1])) {
              intersectPt = {
                x: (t1.points[a].x + t1.points[a+1].x + t2.points[b].x + t2.points[b+1].x) / 4,
                y: (t1.points[a].y + t1.points[a+1].y + t2.points[b].y + t2.points[b+1].y) / 4
              };
              found = true;
            }
            const d = this.segmentToSegmentDist(
              t1.points[a].x, t1.points[a].y, t1.points[a+1].x, t1.points[a+1].y,
              t2.points[b].x, t2.points[b].y, t2.points[b+1].x, t2.points[b+1].y
            );
            if (d < minDist) minDist = d;
          }
        }

        // 只有真正靠近（<6px）或线段交叉才算交战
        const COMBAT_DIST = 6;
        if (!found && minDist >= COMBAT_DIST) continue;

        if (!intersectPt) {
          let bestDist = Infinity;
          for (let a = 0; a < t1.points.length; a++) {
            for (let b = 0; b < t2.points.length - 1; b++) {
              const d = pointToLineDist(t1.points[a].x, t1.points[a].y,
                t2.points[b].x, t2.points[b].y, t2.points[b+1].x, t2.points[b+1].y);
              if (d < bestDist) { bestDist = d; intersectPt = t1.points[a]; }
            }
          }
        }

        pairs.push({ t1, t2, point: intersectPt });
        this.combatEvents.push({
          point: intersectPt,
          t1: { owner: t1.owner, atk: t1.atk },
          t2: { owner: t2.owner, atk: t2.atk }
        });
        this.setActionText('⚔️ 交战！' + CONFIG.COLOR_NAMES[t1.owner] + ' vs ' + CONFIG.COLOR_NAMES[t2.owner]);
      }
    }

    // 同时结算ATK + 撤退（引用对象，splice后仍正确）
    for (const p of pairs) {
      if (p.t1.hp <= 0 || p.t2.hp <= 0) continue;
      p.t1.hp -= p.t2.atk;
      p.t2.hp -= p.t1.atk;
      this._retreatTroopIfDeadRef(p.t1);
      this._retreatTroopIfDeadRef(p.t2);
    }
  }

  _retreatTroopIfDeadRef(troop) {
    if (!troop || troop.hp > 0) return;
    const currentSegs = troop.points.length - 1;
    if (currentSegs <= 1) {
      this._destroyCavalryByTroop(troop);
      const idx = this.troops.indexOf(troop);
      if (idx >= 0) this.troops.splice(idx, 1);
      this.setActionText(`${CONFIG.COLOR_NAMES[troop.owner]}兵线撤退！`);
    } else {
      troop.points.pop();
      troop.segCount = Math.max(1, (troop.segCount || currentSegs) - 1);
      troop.hp = troop.type === 'cavalry' ? CONFIG.CAVALRY_HP : CONFIG.TROOP_HP;
      this.setActionText(`${CONFIG.COLOR_NAMES[troop.owner]}兵线被击败，撤回上次位置！`);
    }
  }

  // 兵线撤退（旧接口，兼容现有调用）
  _retreatTroopIfDead(idx) {
    const troop = this.troops[idx];
    if (!troop || troop.hp > 0) return;

    const currentSegs = troop.points.length - 1;

    if (currentSegs <= 1) {
      this._destroyCavalryByTroop(troop);
      this.troops.splice(idx, 1);
      this.setActionText(`${CONFIG.COLOR_NAMES[troop.owner]}兵线撤退！`);
    } else {
      troop.points.pop();
      troop.segCount = Math.max(1, (troop.segCount || currentSegs) - 1);
      troop.hp = troop.type === 'cavalry' ? CONFIG.CAVALRY_HP : CONFIG.TROOP_HP;
      this.setActionText(`${CONFIG.COLOR_NAMES[troop.owner]}兵线被击败，撤回上次位置！`);
    }
  }

  // 计算两条线段之间的最短距离
  segmentToSegmentDist(x1, y1, x2, y2, x3, y3, x4, y4) {
    return Math.min(
      pointToLineDist(x1, y1, x3, y3, x4, y4),
      pointToLineDist(x2, y2, x3, y3, x4, y4),
      pointToLineDist(x3, y3, x1, y1, x2, y2),
      pointToLineDist(x4, y4, x1, y1, x2, y2)
    );
  }

  captureCity(city, attackerId) {
    const oldOwner = city.owner;
    city.owner = attackerId;
    city.hp = 5;
    if (oldOwner !== null && oldOwner !== undefined) {
      const oldPlayer = this.players[oldOwner];
      oldPlayer.cities = oldPlayer.cities.filter(id => id !== city.id);

      // 摧毁被占城的工厂
      this.factories = this.factories.filter(f => f.cityId !== city.id);
      oldPlayer.factories = oldPlayer.factories.filter(fid => {
        const f = this.factories.find(x => x.id === fid);
        return f && f.cityId !== city.id;
      });

      // 原主失去所有城→清除其无城工厂
      if (oldPlayer.cities.length === 0) {
        this.factories = this.factories.filter(f => f.owner !== oldOwner);
        oldPlayer.factories = [];
      }

      // 连接此城的原主兵线回退
      for (const troop of this.troops) {
        if (troop.owner !== oldOwner || troop.hp <= 0) continue;
        const pts = troop.points;
        if (pts.length < 2) continue;
        const d0 = Math.hypot(pts[0].x - city.x, pts[0].y - city.y);
        const dN = Math.hypot(pts[pts.length - 1].x - city.x, pts[pts.length - 1].y - city.y);
        if (d0 < 45) {
          pts.shift();
          if (pts.length === 0) { troop.hp = 0; }
        } else if (dN < 45) {
          pts.pop();
          if (pts.length === 0) { troop.hp = 0; }
        }
      }
      this.troops = this.troops.filter(t => t.hp > 0 && t.points.length >= 2);

      if (city.hasEmperor) {
        city.hasEmperor = false;
        oldPlayer.emperorCityId = null;
        oldPlayer.alive = false;
        this.setActionText(`${oldPlayer.name} 的国家灭亡了！`);
        this.troops = this.troops.filter(t => t.owner !== oldOwner);
        this.factories = this.factories.filter(f => f.owner !== oldOwner);
        this.docks = this.docks.filter(d => d.owner !== oldOwner);
        this.ships = this.ships.filter(s => s.owner !== oldOwner);
        this.cannons = this.cannons.filter(c => c.owner !== oldOwner);
        this.cavalryUnits = this.cavalryUnits.filter(cv => cv.owner !== oldOwner);
        this.supplyLines = this.supplyLines.filter(sl => sl.owner !== oldOwner);
        this.wires = this.wires.filter(w => w.owner !== oldOwner);
        for (const c of this.cities) {
          if (c.owner === oldOwner) { c.owner = null; c.hp = 1; c.hasEmperor = false; }
        }
      }
    }
    this.players[attackerId].cities.push(city.id);
    this.checkWinCondition();
  }

  tryBuildFactory(pos) {
    const player = this.players[this.currentPlayer];
    for (const city of this.cities) {
      if (city.owner === this.currentPlayer && distToPoint(pos.x, pos.y, city.x, city.y) < 35) {
        const exists = this.factories.some(f => f.cityId === city.id);
        if (exists) { this.setActionText('这座城池已经有工厂了'); return; }
      this.factories.push({ id: this.factories.length, cityId: city.id, x: city.x + 25, y: city.y - 5, owner: this.currentPlayer, hp: CONFIG.FACTORY_HP });
      player.factories.push(this.factories.length - 1);
      this.setActionText('工厂建造完成'); this.autoNextTurn(); return;
      }
    }
    this.setActionText('请点击你占领的城池');
  }

  tryBuildRope(pos) {
    for (const mtn of this.mountains) {
      if (pointOnMountain(pos.x, pos.y, mtn) && !mtn.hasRope) {
        mtn.hasRope = true; mtn.ropeOwner = this.currentPlayer;
        this.setActionText('绳子修建完成'); this.autoNextTurn(); return;
      }
    }
    this.setActionText('请点击山体');
  }

  tryBuildDock(pos) {
    let hasFactory = false;
    for (const f of this.factories) {
      if (f.owner === this.currentPlayer && distToPoint(pos.x, pos.y, f.x, f.y) < 200) { hasFactory = true; break; }
    }
    if (!hasFactory) { this.setActionText('需要在河附近有工厂才能修码头'); return; }
    for (const river of this.rivers) {
      if (pointNearRiver(pos.x, pos.y, river)) {
        const exists = this.docks.some(d => distToPoint(pos.x, pos.y, d.x, d.y) < 30);
        if (exists) { this.setActionText('这里已经有码头了'); return; }
        this.docks.push({ id: this.docks.length, x: pos.x, y: pos.y, owner: this.currentPlayer, riverId: river.id });
        this.setActionText('码头修建完成'); this.autoNextTurn(); return;
      }
    }
    this.setActionText('请点击河流');
  }

  tryBuildShip(pos) {
    for (const dock of this.docks) {
      if (dock.owner === this.currentPlayer && distToPoint(pos.x, pos.y, dock.x, dock.y) < 25) {
        // 计算偏移方向（垂直于码头所在河流）
        const river = this.rivers.find(r => r.id === dock.riverId);
        let angle = 0;
        if (river) {
          const t = this._findNearestRiverT(dock.x, dock.y, river);
          angle = getRiverAngleAt(river, t, Math.PI / 2);
        }
        const count = this.ships.filter(s => s.dockId === dock.id).length;
        const offset = 20 + count * 18;
        const side = count % 2 === 0 ? 1 : -1;
        let sx = dock.x + Math.cos(angle) * offset * side;
        let sy = dock.y + Math.sin(angle) * offset * side;
        // 确保船在河上：如果不靠近河流，往河方向拉回
        if (!this.rivers.some(r => pointNearRiver(sx, sy, r, 50))) {
          sx = dock.x + Math.cos(angle) * 8 * side; // 缩小偏移
          sy = dock.y + Math.sin(angle) * 8 * side;
        }
        const spawnX = sx + Math.cos(angle) * 12 * side;
        const spawnY = sy + Math.sin(angle) * 12 * side;
        this.ships.push({ id: this.ships.length, dockId: dock.id, x: sx, y: sy, owner: this.currentPlayer, spawnX, spawnY });
        this.setActionText('船建造完成'); this.autoNextTurn(); return;
      }
    }
    this.setActionText('请点击你修建的码头');
  }

  tryBuildCannon(pos) {
    const player = this.players[this.currentPlayer];
    if (player.factories.length === 0) { this.setActionText('你需要先建造工厂'); return; }
    this.cannons.push({ id: this.cannons.length, x: pos.x, y: pos.y, owner: this.currentPlayer, hp: CONFIG.CANNON_HP });
    this.setActionText('大炮建造完成，请用"连引线"连接工厂'); this.autoNextTurn();
  }

  tryPlaceCavalry(pos) {
    // 必须在己方工厂附近
    let nearFactory = false;
    for (const f of this.factories) {
      if (f.owner === this.currentPlayer && distToPoint(pos.x, pos.y, f.x, f.y) < 100) {
        nearFactory = true; break;
      }
    }
    if (!nearFactory) { this.setActionText('骑兵必须放置在己方工厂附近'); return; }
    this.cavalryUnits.push({
      id: this.cavalryUnits.length,
      x: pos.x, y: pos.y,
      spawnX: pos.x, spawnY: pos.y + 20,
      owner: this.currentPlayer,
      hp: CONFIG.CAVALRY_UNIT_HP,
      hasTroop: false
    });
    this.setActionText('骑兵部署完成，从下方圆点出兵'); this.autoNextTurn();
  }

  // 生成弹簧线的采样点（与drawSpringLine算法一致）
  getSpringLinePoints(points, amp = 3, seg = 6) {
    const result = [];
    for (let i = 0; i < points.length - 1; i++) {
      const p1 = points[i], p2 = points[i+1];
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy);
      if (len < 0.1) continue;
      const nx = -dy / len, ny = dx / len;
      const steps = Math.max(3, Math.floor(len / 2));
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const dist = len * t;
        const wave = Math.sin(dist / seg * Math.PI * 2) * amp;
        result.push({ x: p1.x + dx * t + nx * wave, y: p1.y + dy * t + ny * wave });
      }
    }
    return result;
  }

  // 画反波浪弹簧线（导火索样式）
  drawSpringLine(ctx, points, color, amp = 3, seg = 6, lineWidth = 1.5) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    const sampled = this.getSpringLinePoints(points, amp, seg);
    if (sampled.length === 0) return;
    ctx.moveTo(sampled[0].x, sampled[0].y);
    for (let i = 1; i < sampled.length; i++) ctx.lineTo(sampled[i].x, sampled[i].y);
    ctx.stroke();
  }

  drawCavalryHorse(ctx, x, y, color, scale = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale * 0.7, scale * 0.7);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(4, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4, 0); ctx.quadraticCurveTo(6, -4, 10, -6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(2, 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-2, 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(-6, 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.quadraticCurveTo(-12, 2, -14, 6); ctx.stroke();
    ctx.restore();
  }

  startSupplyDrag(pos) {
    // 长按右键开始画粮线
    this.dragStart = { x: pos.x, y: pos.y, mode: 'supply' };
    this.dragCurrent = pos;
    this.supplyDragPoints = [{ x: pos.x, y: pos.y }];
  }

  finishSupplyDrag() {
    const start = this.dragStart;
    const end = this.dragCurrent;
    const points = this.supplyDragPoints || [{ x: start.x, y: start.y }, { x: end.x, y: end.y }];
    this.dragStart = null; this.dragCurrent = null;
    this.supplyDragPoints = null;

    if (points.length < 2) { this.render(); return; }

    // 找起点最近的城池
    let nearestCity = null, minCityD = Infinity;
    for (const c of this.cities) {
      if (c.owner !== this.currentPlayer) continue;
      const d = distToPoint(points[0].x, points[0].y, c.x, c.y);
      if (d < minCityD) { minCityD = d; nearestCity = c; }
    }
    // 找终点最近的兵线上的点
    let nearestTroopPt = null, minTroopD = Infinity, targetTroop = null;
    for (const troop of this.troops) {
      if (troop.owner !== this.currentPlayer) continue;
      for (const p of troop.points) {
        const d = distToPoint(end.x, end.y, p.x, p.y);
        if (d < minTroopD) { minTroopD = d; nearestTroopPt = p; targetTroop = troop; }
      }
    }

    if (!nearestCity) { this.setActionText('附近没有我方城池'); this.render(); return; }
    if (!targetTroop) { this.setActionText('请把粮线画到兵线上'); this.render(); return; }
    if (targetTroop.supplyExtended) { this.setActionText('这条兵线已经续过粮了'); this.render(); return; }

    targetTroop.supplyExtended = true;
    targetTroop.maxSegments += CONFIG.SUPPLY_SEGMENTS;

    // 粮线：从城池到兵线最近点，保留自由轨迹
    this.supplyLines.push({
      id: this.supplyLines.length,
      owner: this.currentPlayer,
      troopId: targetTroop.id,
      cityId: nearestCity.id,
      points: [
        { x: nearestCity.x, y: nearestCity.y },
        ...points,
        { x: nearestTroopPt.x, y: nearestTroopPt.y }
      ],
      hp: 1
    });

    this.setActionText('粮线已连接');
    this.autoNextTurn();
  }

  startWireDrag(pos) {
    this.dragStart = { x: pos.x, y: pos.y, mode: 'wire' };
    this.dragCurrent = pos;
    this.supplyDragPoints = [{ x: pos.x, y: pos.y }];
  }

  finishWireDrag() {
    const start = this.dragStart;
    const end = this.dragCurrent;
    const points = this.supplyDragPoints || [{ x: start.x, y: start.y }, { x: end.x, y: end.y }];
    this.dragStart = null; this.dragCurrent = null;
    this.supplyDragPoints = null;

    if (points.length < 2) { this.render(); return; }

    // 找起点最近的我方工厂
    let nearestFactory = null, minF = Infinity;
    for (const f of this.factories) {
      if (f.owner !== this.currentPlayer) continue;
      const d = distToPoint(points[0].x, points[0].y, f.x, f.y);
      if (d < minF) { minF = d; nearestFactory = f; }
    }
    // 找终点最近的我方大炮
    let nearestCannon = null, minC = Infinity;
    for (const c of this.cannons) {
      if (c.owner !== this.currentPlayer) continue;
      const d = distToPoint(end.x, end.y, c.x, c.y);
      if (d < minC) { minC = d; nearestCannon = c; }
    }

    if (!nearestFactory) { this.setActionText('引线起点附近没有我方工厂'); this.render(); return; }
    if (!nearestCannon) { this.setActionText('引线终点附近没有我方大炮'); this.render(); return; }

    this.wires.push({
      id: this.wires.length,
      owner: this.currentPlayer,
      factoryId: nearestFactory.id,
      cannonId: nearestCannon.id,
      points: [ { x: nearestFactory.x, y: nearestFactory.y }, ...points, { x: nearestCannon.x, y: nearestCannon.y } ],
      hp: 1
    });

    this.setActionText('引线已连接，大炮可以开火了！');
    this.autoNextTurn();
  }

  tryMoveEmperor(pos) {
    const player = this.players[this.currentPlayer];
    if (player.emperorCityId === null) return;
    const emperorCity = this.cities[player.emperorCityId];
    // 找到点击的目标城池
    let targetCity = null;
    for (const city of this.cities) {
      if (city.id === player.emperorCityId) continue;
      if (city.owner !== this.currentPlayer) continue;
      if (distToPoint(pos.x, pos.y, city.x, city.y) <= 35) { targetCity = city; break; }
    }
    if (!targetCity) { this.setActionText('请点击你占领的城池'); return; }
    // BFS：通过兵线网络检查皇帝城到目标城是否连通
    const visited = new Set([emperorCity.id]);
    const queue = [emperorCity.id];
    let reachable = false;
    while (queue.length > 0) {
      const curId = queue.shift();
      if (curId === targetCity.id) { reachable = true; break; }
      const curCity = this.cities[curId];
      // 找所有触及当前城的我方兵线
      for (const troop of this.troops) {
        if (troop.owner !== this.currentPlayer) continue;
        let touchesCur = false;
        for (const p of troop.points) {
          if (distToPoint(p.x, p.y, curCity.x, curCity.y) < 35) { touchesCur = true; break; }
        }
        if (!touchesCur) continue;
        // 该兵线触及当前城 → 找到该兵线触及的所有我方城
        for (const city of this.cities) {
          if (city.owner !== this.currentPlayer) continue;
          if (visited.has(city.id)) continue;
          let touchesCity = false;
          for (const p of troop.points) {
            if (distToPoint(p.x, p.y, city.x, city.y) < 35) { touchesCity = true; break; }
          }
          if (touchesCity) {
            visited.add(city.id);
            queue.push(city.id);
          }
        }
      }
    }
    if (reachable) {
      emperorCity.hasEmperor = false; targetCity.hasEmperor = true;
      player.emperorCityId = targetCity.id;
      this.setActionText('皇帝已移动'); this.autoNextTurn(); return;
    } else {
      this.setActionText('需要有兵线连接的城池才能移动皇帝'); return;
    }
  }

  tryBurnRope(pos) {
    for (const mtn of this.mountains) {
      if (mtn.hasRope && pointOnMountain(pos.x, pos.y, mtn)) {
        mtn.hasRope = false; mtn.ropeOwner = null;
        for (let i = this.troops.length - 1; i >= 0; i--) {
          const troop = this.troops[i];
          for (const p of troop.points) {
            if (pointOnMountain(p.x, p.y, mtn)) {
              let onEdge = false;
              const pts = mtn.points;
              for (let j = 0; j < pts.length - 1; j++) {
                if (pointToLineDist(p.x, p.y, pts[j].x, pts[j].y, pts[j+1].x, pts[j+1].y) < 10) { onEdge = true; break; }
              }
              if (!onEdge) { this._destroyCavalryByTroop(troop); this.troops.splice(i, 1); break; }
            }
          }
        }
        this.setActionText('绳子已烧断'); this.autoNextTurn(); return;
      }
    }
    this.setActionText('请点击有绳子的山体');
  }

  tryCannonAttack(pos) {
    // 第一步：尝试选中自己的大炮
    if (!this.selectedCannon) {
      let found = null;
      for (const c of this.cannons) {
        if (c.owner === this.currentPlayer && distToPoint(pos.x, pos.y, c.x, c.y) < 20) {
          found = c;
        }
      }
      if (found) {
        // 检查是否有连接的引线且血量>0
        const hasWire = this.wires.some(w => w.cannonId === found.id && w.owner === this.currentPlayer && w.hp > 0);
        if (!hasWire) {
          this.setActionText('大炮未连接引线，无法开火！请先用"连引线"连接工厂');
          this.render();
          return;
        }
        this.selectedCannon = found;
        this.setActionText('大炮已选中，点击目标开炮');
        this.render();
        return;
      }
      this.setActionText('请先点击你的大炮（红色虚线炮）'); return;
    }
    // 第二步：开炮
    const cannon = this.selectedCannon;
    const rangeDist = distToPoint(pos.x, pos.y, cannon.x, cannon.y);
    if (rangeDist > CONFIG.CANNON_RANGE) {
      this.setActionText(`目标超出射程（距离${Math.round(rangeDist)}，射程${CONFIG.CANNON_RANGE}）`);
      this.selectedCannon = null; this.render(); return;
    }
    // 按优先级逐个检测目标
    let hit = false;
    // 1. 敌方大炮
    for (let i = this.cannons.length - 1; i >= 0; i--) {
      const c = this.cannons[i];
      if (c.owner === this.currentPlayer) continue;
      if (distToPoint(pos.x, pos.y, c.x, c.y) < 50) {
        c.hp -= CONFIG.CANNON_ATK;
        if (c.hp <= 0) { const cid = c.id; this.cannons.splice(i, 1); this.wires = this.wires.filter(w => w.cannonId !== cid); this.setActionText('敌方大炮被摧毁！'); }
        else { this.setActionText(`命中敌方大炮！剩余血量: ${c.hp}`); }
        hit = true; break;
      }
    }
    if (hit) {
      // 消耗引线血量
      this._consumeWireHp(cannon.id);
      this.selectedCannon = null; this.autoNextTurn(); return;
    }
    // 2. 敌方城池
    for (const city of this.cities) {
      if (city.owner !== this.currentPlayer && distToPoint(pos.x, pos.y, city.x, city.y) < 35) {
        city.hp -= CONFIG.CANNON_ATK;
        this.setActionText(`命中城池！剩余血量: ${city.hp}`);
        if (city.hp <= 0) this.captureCity(city, this.currentPlayer);
        hit = true; break;
      }
    }
    if (hit) {
      // 消耗引线血量
      this._consumeWireHp(cannon.id);
      this.selectedCannon = null; this.autoNextTurn(); return;
    }
    // 3. 敌方工厂
    for (const f of this.factories) {
      if (f.owner !== this.currentPlayer && distToPoint(pos.x, pos.y, f.x, f.y) < 25) {
        f.hp -= CONFIG.CANNON_ATK;
        this.setActionText(`命中工厂！剩余血量: ${f.hp}`);
        if (f.hp <= 0) this.destroyFactory(f);
        hit = true; break;
      }
    }
    if (hit) {
      // 消耗引线血量
      this._consumeWireHp(cannon.id);
      this.selectedCannon = null; this.autoNextTurn(); return;
    }
    // 4. 敌方兵线
    for (let i = this.troops.length - 1; i >= 0; i--) {
      const t = this.troops[i];
      if (t.owner === this.currentPlayer) continue;
      for (const p of t.points) {
        if (distToPoint(pos.x, pos.y, p.x, p.y) < 15) {
          t.hp -= CONFIG.CANNON_ATK;
          this.setActionText(`命中兵线！剩余血量: ${t.hp}`);
          if (t.hp <= 0) { this._destroyCavalryByTroop(t); this.troops.splice(i, 1); }
          hit = true; break;
        }
      }
      if (hit) break;
    }
    if (hit) {
      // 消耗引线血量
      this._consumeWireHp(cannon.id);
      this.selectedCannon = null; this.autoNextTurn(); return;
    }
    // 5. 敌方粮线（修正：用点到线段距离）
    for (let i = this.supplyLines.length - 1; i >= 0; i--) {
      const sl = this.supplyLines[i];
      if (sl.owner === this.currentPlayer) continue;
      let nearSupply = false;
      for (let j = 0; j < sl.points.length - 1; j++) {
        if (pointToLineDist(pos.x, pos.y, sl.points[j].x, sl.points[j].y, sl.points[j+1].x, sl.points[j+1].y) < 25) { nearSupply = true; break; }
      }
      if (nearSupply) {
        sl.hp -= 1;
        if (sl.hp <= 0) { this.supplyLines.splice(i, 1); this.setActionText('粮线被切断！'); }
        else { this.setActionText(`粮线受伤！剩余血量: ${sl.hp}`); }
        hit = true; break;
      }
    }
    if (hit) {
      // 消耗引线血量
      this._consumeWireHp(cannon.id);
      this.selectedCannon = null; this.autoNextTurn(); return;
    }
    // 6. 敌方引线（点到线段距离 + 点到端点备用检测）
    for (let i = this.wires.length - 1; i >= 0; i--) {
      const w = this.wires[i];
      if (w.owner === this.currentPlayer) continue;
      let nearWire = false;
      for (let j = 0; j < w.points.length - 1; j++) {
        if (pointToLineDist(pos.x, pos.y, w.points[j].x, w.points[j].y, w.points[j+1].x, w.points[j+1].y) < 50) { nearWire = true; break; }
      }
      // 备用：检测是否靠近任意端点
      if (!nearWire) {
        for (const p of w.points) {
          if (distToPoint(pos.x, pos.y, p.x, p.y) < 50) { nearWire = true; break; }
        }
      }
      if (nearWire) {
        w.hp -= 1;
        if (w.hp <= 0) { this.wires.splice(i, 1); this.setActionText('敌方引线被切断！'); }
        else { this.setActionText('敌方引线受伤！'); }
        hit = true; break;
      }
    }
    if (hit) {
      // 消耗己方引线血量
      this._consumeWireHp(cannon.id);
      this.selectedCannon = null; this.autoNextTurn(); return;
    }
    this.setActionText('未命中任何目标，请再试');
    this.selectedCannon = null; this.render();
  }

  destroyFactory(factory) {
    const owner = factory.owner;
    this.docks = this.docks.filter(d => d.owner !== owner || distToPoint(d.x, d.y, factory.x, factory.y) > 150);
    this.ships = this.ships.filter(s => s.owner !== owner || !this.docks.some(d => d.id === s.dockId));
    this.factories = this.factories.filter(f => f.id !== factory.id);
  }

  setMode(mode) {
    this.mode = mode;
    this.selectedCannon = null;
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    if (mode) {
      const btnMap = {
        troop: 'btnTroop', factory: 'btnFactory', rope: 'btnRope',
        dock: 'btnDock', ship: 'btnShip', cannon: 'btnCannon',
        wire: 'btnWire', supply: 'btnSupply', moveEmperor: 'btnMoveEmperor', burnRope: 'btnBurnRope',
        cavalry: 'btnCavalry', attack: 'btnAttack', pan: 'btnPan'
      };
      const btn = document.getElementById(btnMap[mode]);
      if (btn) btn.classList.add('active');
      if (mode === 'pan') {
        this.canvas.style.cursor = 'grab';
        this.setActionText('左键拖动平移地图，滚轮缩放');
        return;
      }
      this.canvas.style.cursor = 'crosshair';
    }

    // 根据是否为移动端显示不同提示
    const touchHint = this.isMobile ? '长按' : '右键';
    const clickHint = this.isMobile ? '点击' : '左键点击';

    if (mode === 'troop') this.setActionText(`${touchHint}源头朝反方向拖拽出兵`);
    else if (mode === 'factory') this.setActionText(`${clickHint}你的城池建造工厂`);
    else if (mode === 'rope') this.setActionText(`${clickHint}山体修建绳子`);
    else if (mode === 'dock') this.setActionText(`${clickHint}河流修建码头`);
    else if (mode === 'ship') this.setActionText(`${clickHint}码头造船`);
    else if (mode === 'cannon') this.setActionText(`${clickHint}任意位置建造大炮`);
    else if (mode === 'wire') this.setActionText(`${touchHint}从工厂画引线到大炮`);
    else if (mode === 'supply') this.setActionText(`${touchHint}画粮线（从城池到兵线）`);
    else if (mode === 'moveEmperor') this.setActionText(`${clickHint}有兵线连接的城池移动皇帝`);
    else if (mode === 'burnRope') this.setActionText(`${clickHint}有绳子的山体烧断`);
    else if (mode === 'cavalry') this.setActionText(`${clickHint}工厂附近放置骑兵`);
    else if (mode === 'attack') this.setActionText(`${clickHint}大炮然后${clickHint}目标开炮`);
    else { this.canvas.style.cursor = 'crosshair'; this.setActionText('操作后自动进入下一回合'); }
  }

  setActionText(text) {
    document.getElementById('actionText').textContent = text;
    // 移动端：更新底部提示
    if (this.isMobile) {
      const touchHint = document.getElementById('touchHint');
      if (this.mode === 'troop' || this.mode === 'supply' || this.mode === 'wire') {
        touchHint.style.display = 'block';
        touchHint.textContent = '长按拖拽';
      } else if (this.mode === 'attack') {
        touchHint.style.display = 'block';
        touchHint.textContent = '点击大炮后点击目标';
      } else {
        touchHint.style.display = 'none';
      }
    }
  }

  // 自动结束回合，切换到下一个玩家
  autoNextTurn() {
    if (this.state !== 'playing') return;
    // 联机模式：使用联机回合切换
    if (this.gameMode === 'online') { this._onlineEndTurn(); return; }
    this.troops = this.troops.filter(t => t.hp > 0);
    this.combatEvents = [];
    this.checkWinCondition();
    if (this.state === 'gameover') return;
    this.currentPlayer = (this.currentPlayer + 1) % CONFIG.PLAYERS;
    if (this.currentPlayer === 0) this.turn++;
    while (!this.players[this.currentPlayer].alive) {
      this.currentPlayer = (this.currentPlayer + 1) % CONFIG.PLAYERS;
      if (this.currentPlayer === 0) this.turn++;
    }
    this.setMode(null); this.updateUI(); this.render();
    if (this.gameMode === 'ai' && !this.players[this.currentPlayer].isHuman) {
      setTimeout(() => this.startAITurn(), 500);
    } else {
      this.aiThinking = false;
      this.setButtonsEnabled(true);
    }
  }

  endTurn() {
    if (this.state !== 'playing') return;
    // 联机模式：使用联机回合切换
    if (this.gameMode === 'online') { this._onlineEndTurn(); return; }
    // 如果AI正在执行，延迟结束回合
    if (this.aiThinking) {
      setTimeout(() => this.endTurn(), 200);
      return;
    }
    this.troops = this.troops.filter(t => t.hp > 0);
    this.combatEvents = [];
    this.checkWinCondition();
    if (this.state === 'gameover') return;
    this.currentPlayer = (this.currentPlayer + 1) % CONFIG.PLAYERS;
    if (this.currentPlayer === 0) this.turn++;
    while (!this.players[this.currentPlayer].alive) {
      this.currentPlayer = (this.currentPlayer + 1) % CONFIG.PLAYERS;
      if (this.currentPlayer === 0) this.turn++;
    }
    this.setMode(null); this.updateUI(); this.render();
    if (this.gameMode === 'ai' && !this.players[this.currentPlayer].isHuman) {
      this.aiThinking = true; // 在触发startAITurn前就锁定
      setTimeout(() => this.startAITurn(), 500);
    } else {
      this.aiThinking = false;
      this.setButtonsEnabled(true);
    }
  }

  checkWinCondition() {
    const alivePlayers = this.players.filter(p => p.alive);
    if (alivePlayers.length <= 1) {
      this.state = 'gameover';
      document.getElementById('btnQuit').style.display = 'none';
      const winner = alivePlayers[0];
      document.getElementById('gameOverOverlay').style.display = 'flex';
      if (winner) {
        document.getElementById('winnerText').textContent = `${winner.name} 获胜！`;
        document.getElementById('winnerDesc').textContent = `玩家 ${winner.id + 1} 统一了世界！`;
        document.getElementById('winnerText').style.color = winner.color;
      } else {
        document.getElementById('winnerText').textContent = '平局！';
      }
    }
  }

  confirmQuit() {
    document.getElementById('quitConfirmOverlay').style.display = 'flex';
  }
  cancelQuit() {
    document.getElementById('quitConfirmOverlay').style.display = 'none';
  }
  quitGame() {
    document.getElementById('quitConfirmOverlay').style.display = 'none';
    document.getElementById('btnQuit').style.display = 'none';
    document.getElementById('gameOverOverlay').style.display = 'none';
    document.getElementById('emperorPrompt').style.display = 'none';
    document.getElementById('topBar').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('aiLog').style.display = 'none';
    if (this.network) { this.network.disconnect(); this.network = null; }
    this.state = 'menu';
    this.gameMode = null; this._onlineGameStarted = false; this.aiThinking = false;
    this.cities = []; this.mountains = []; this.rivers = [];
    this.troops = []; this.factories = []; this.docks = []; this.ships = [];
    this.cannons = []; this.cavalryUnits = []; this.supplyLines = []; this.wires = [];
    this.combatEvents = []; this.players = [];
    this.setMode(null); this.currentPlayer = 0; this.turn = 1;
    this._emperorDragStart = null;
    this.selectedCannon = null; this.selectedCity = null;
    document.getElementById('playerSelectOverlay').style.display = 'flex';
    document.getElementById('modeSelectScreen').style.display = 'block';
    document.getElementById('localSetupScreen').style.display = 'none';
    document.getElementById('aiSetupScreen').style.display = 'none';
    document.getElementById('onlineLobbyScreen').style.display = 'none';
    document.getElementById('currentPlayerText').textContent = '玩家 1 的回合';
    document.getElementById('turnText').textContent = '第 1 轮';
    document.getElementById('actionText').textContent = '请选择游戏模式开始游戏';
    this.renderMenu();
  }

  updateUI() {
    const player = this.players[this.currentPlayer];
    document.getElementById('currentColorDot').style.background = player.color;
    document.getElementById('currentPlayerText').textContent = `玩家 ${this.currentPlayer + 1} (${player.name}) 的回合`;
    document.getElementById('turnText').textContent = `第 ${this.turn} 轮`;
    document.getElementById('actionText').textContent = '请选择操作';
  }

  // ==================== 渲染 ====================
  render() {
    if (this._edit) { this._editRender(); return; }
    const ctx = this.ctx;
    ctx.save();
    ctx.clearRect(0, 0, CONFIG.MAP_W, CONFIG.MAP_H);
    ctx.fillStyle = '#FCF9F2';
    ctx.fillRect(0, 0, CONFIG.MAP_W, CONFIG.MAP_H);

    ctx.scale(this.camera.zoom, this.camera.zoom);
    ctx.translate(-this.camera.x, -this.camera.y);

    // 河流先画，不跟手绘抖动
    for (const river of this.rivers) {
      ctx.strokeStyle = '#3366AA'; ctx.lineWidth = river.width || 55;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      const pts = getRiverPoints(river, 0.04);
      if (pts.length >= 2) {
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
      }
    }

    // 河流桥梁
    for (const river of this.rivers) {
      for (const br of (river.bridges || [])) {
        let angle = 0;
        if (river.points) {
          const pts = river.points;
          let bestD = Infinity;
          for (let i = 0; i < pts.length - 1; i++) {
            const pa = pts[i], pb = pts[i + 1];
            const dx = pb.x - pa.x, dy = pb.y - pa.y, len = Math.hypot(dx, dy);
            if (len < 2) continue;
            const tt = Math.max(0, Math.min(1, ((br.x - pa.x) * dx + (br.y - pa.y) * dy) / (len * len)));
            const px = pa.x + tt * dx, py = pa.y + tt * dy;
            const d = Math.hypot(br.x - px, br.y - py);
            if (d < bestD) { bestD = d; angle = Math.atan2(dy, dx) + Math.PI / 2; }
          }
        } else {
          const dt = 0.01;
          let t0 = Math.max(0, br.t - dt), t1 = Math.min(1, br.t + dt);
          const a2 = bezierPoint(t0, river.p0, river.p1, river.p2, river.p3);
          const b2 = bezierPoint(t1, river.p0, river.p1, river.p2, river.p3);
          angle = Math.atan2(b2.y - a2.y, b2.x - a2.x) + Math.PI / 2;
        }
        ctx.save(); ctx.translate(br.x, br.y); ctx.rotate(angle);
        ctx.fillStyle = '#D4A76A'; ctx.fillRect(-50, -18, 100, 36);
        ctx.strokeStyle = '#4A3728'; ctx.lineWidth = 3;
        sketchRect(ctx, -50, -18, 100, 36, 3);
        ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1.5;
        for (let lx = -40; lx <= 40; lx += 10) {
          ctx.beginPath(); ctx.moveTo(jitter(lx,1.5), jitter(-18,1.5)); ctx.lineTo(jitter(lx,1.5), jitter(18,1.5)); ctx.stroke();
        }
        ctx.restore();
      }
    }

    ctx.strokeStyle = 'rgba(0,0,0,0.03)'; ctx.lineWidth = 0.5;
    for (let x = 0; x < CONFIG.MAP_W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CONFIG.MAP_H); ctx.stroke(); }
    for (let y = 0; y < CONFIG.MAP_H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CONFIG.MAP_W, y); ctx.stroke(); }

    for (const mtn of this.mountains) {
      ctx.strokeStyle = '#4A3728'; ctx.lineWidth = 2.5; ctx.fillStyle = '#FCF9F2';
      ctx.beginPath(); const pts = mtn.points;
      ctx.moveTo(jitter(pts[0].x,2), jitter(pts[0].y,2));
      for (let i = 1; i < pts.length; i++) ctx.lineTo(jitter(pts[i].x,2), jitter(pts[i].y,2));
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#4A3728'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(jitter(mtn.x-10,1), jitter(mtn.y-mtn.h/2+5,1));
      ctx.lineTo(jitter(mtn.x,1), jitter(mtn.y-mtn.h/2-5,1));
      ctx.lineTo(jitter(mtn.x+10,1), jitter(mtn.y-mtn.h/2+5,1)); ctx.stroke();
      if (mtn.hasRope) {
        ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(mtn.x, mtn.y - mtn.h/2);
        for (let i = 1; i <= 10; i++) {
          const t = i / 10, zigzag = (i % 2 === 0 ? 8 : -8);
          ctx.lineTo(mtn.x + zigzag, mtn.y - mtn.h/2 + t * mtn.h);
        }
        ctx.stroke();
      }
    }

    ctx.setLineDash([5, 4]);
    for (const sl of this.supplyLines) {
      if (sl.points.length < 2) continue;
      ctx.strokeStyle = CONFIG.COLORS[sl.owner]; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.moveTo(jitter(sl.points[0].x,1.5), jitter(sl.points[0].y,1.5));
      for (let i = 1; i < sl.points.length; i++) ctx.lineTo(jitter(sl.points[i].x,1.5), jitter(sl.points[i].y,1.5));
      ctx.stroke();
      ctx.globalAlpha = 1;
      const mid = sl.points[Math.floor(sl.points.length / 2)];
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mid.x + 6, mid.y - 10, 20, 14);
      ctx.fillStyle = CONFIG.COLORS[sl.owner]; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('粮'+sl.hp, mid.x + 8, mid.y + 2);
    }
    for (const w of this.wires) {
      if (w.points.length < 2) continue;
      this.drawSpringLine(ctx, w.points, CONFIG.COLORS[w.owner], 2, 8, 1.2);
    }
    ctx.setLineDash([]);

    for (const f of this.factories) {
      ctx.fillStyle = '#FCF9F2'; ctx.strokeStyle = CONFIG.COLORS[f.owner]; ctx.lineWidth = 2;
      sketchRect(ctx, f.x-12, f.y-16, 24, 28, 1.5);
      ctx.beginPath(); ctx.moveTo(jitter(f.x-14,1), jitter(f.y-16,1)); ctx.lineTo(jitter(f.x,1), jitter(f.y-24,1)); ctx.lineTo(jitter(f.x+14,1), jitter(f.y-16,1)); ctx.closePath(); ctx.stroke();
      ctx.fillStyle = '#000'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('工'+f.hp, f.x, f.y + 20);
    }

    for (const d of this.docks) {
      const river = this.rivers.find(r => r.id === d.riverId);
      let angle = 0;
      if (river) {
        const dt = 0.02;
        const t = Math.max(0.05, Math.min(0.95, this._findNearestRiverT(d.x, d.y, river)));
        angle = getRiverAngleAt(river, t);
      }
      ctx.strokeStyle = CONFIG.COLORS[d.owner]; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(d.x - Math.cos(angle) * 16, d.y - Math.sin(angle) * 16);
      ctx.lineTo(d.x + Math.cos(angle) * 16, d.y + Math.sin(angle) * 16);
      ctx.stroke();
    }

    for (const s of this.ships) {
      const dock = this.docks.find(d => d.id === s.dockId);
      let angle = 0;
      if (dock) {
        const river = this.rivers.find(r => r.id === dock.riverId);
        if (river) {
          const t = Math.max(0.05, Math.min(0.95, this._findNearestRiverT(dock.x, dock.y, river)));
          angle = getRiverAngleAt(river, t, Math.PI / 2);
        }
      }
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(angle);
      ctx.strokeStyle = CONFIG.COLORS[s.owner]; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-10, 0); ctx.quadraticCurveTo(0, -8, 10, 0); ctx.stroke();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, -14); ctx.stroke();
      ctx.restore();
      // 出兵圆点
      if (s.spawnX !== undefined) {
        ctx.strokeStyle = CONFIG.COLORS[s.owner]; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(s.spawnX, s.spawnY, 6, 0, Math.PI*2); ctx.stroke();
        // 检查是否有兵线
        const hasTroop = this.troops.some(t => t.shipId === s.id && t.hp > 0);
        if (!hasTroop) {
          ctx.fillStyle = CONFIG.COLORS[s.owner]; ctx.globalAlpha = 0.5;
          ctx.beginPath(); ctx.arc(s.spawnX, s.spawnY, 3, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    for (const c of this.cannons) {
      ctx.strokeStyle = CONFIG.COLORS[c.owner]; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.25;
      ctx.beginPath(); ctx.arc(c.x, c.y, CONFIG.CANNON_RANGE, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha = 1;
      ctx.fillStyle = '#FCF9F2'; ctx.strokeStyle = CONFIG.COLORS[c.owner]; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x+18, c.y-6); ctx.stroke();
      if (this.selectedCannon && this.selectedCannon === c) {
        ctx.strokeStyle = '#f90'; ctx.lineWidth = 2; ctx.setLineDash([3,2]);
        ctx.beginPath(); ctx.arc(c.x, c.y, 16, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      }
    }

    for (const cv of this.cavalryUnits) {
      const color = CONFIG.COLORS[cv.owner];
      this.drawCavalryHorse(ctx, cv.x, cv.y, color, 0.8);
      ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cv.spawnX, cv.spawnY, 6, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#000'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(cv.hp, cv.x, cv.y - 14);
    }

    for (const troop of this.troops) {
      if (troop.points.length < 2) continue;
      const color = CONFIG.COLORS[troop.owner];
      ctx.strokeStyle = color; ctx.lineWidth = troop.type === 'cavalry' ? 2 : 1.5;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(troop.points[0].x, troop.points[0].y);
      for (let i = 1; i < troop.points.length; i++) ctx.lineTo(troop.points[i].x, troop.points[i].y);
      ctx.stroke();
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.moveTo(troop.points[0].x, troop.points[0].y);
      for (let i = 1; i < troop.points.length; i++) ctx.lineTo(troop.points[i].x, troop.points[i].y);
      ctx.stroke();
      ctx.globalAlpha = 1;
      if (troop.type === 'cavalry') {
        this.drawCavalryHorse(ctx, troop.points[0].x, troop.points[0].y, color, 0.7);
      }
      const endPoint = troop.points[troop.points.length - 1];
      ctx.fillStyle = '#000'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('\u2665'+troop.hp+' \u2694'+troop.atk, endPoint.x + 10, endPoint.y + 2);
    }

    if (this.combatEvents) {
      for (const event of this.combatEvents) {
        const { x, y } = event.point;
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.stroke();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x - 8, y - 8); ctx.lineTo(x + 8, y + 8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 8, y - 8); ctx.lineTo(x - 8, y + 8); ctx.stroke();
      }
    }

    ctx.textAlign = 'center';

    if (this.dragStart && this.dragCurrent) {
      if ((this.mode === 'supply' || this.mode === 'wire') && this.supplyDragPoints) {
        // 续粮/引线模式：画自由轨迹预览
        if (this.supplyDragPoints.length > 1) {
          ctx.strokeStyle = CONFIG.COLORS[this.currentPlayer]; ctx.lineWidth = 3;
          ctx.globalAlpha = 0.8; ctx.setLineDash([6, 3]);
          ctx.beginPath();
          ctx.moveTo(this.supplyDragPoints[0].x, this.supplyDragPoints[0].y);
          for (let i = 1; i < this.supplyDragPoints.length; i++) {
            ctx.lineTo(this.supplyDragPoints[i].x, this.supplyDragPoints[i].y);
          }
          ctx.lineTo(this.dragCurrent.x, this.dragCurrent.y);
          ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;
        }
      } else {
        // 拉弓式出兵：只画拖拽线，射击方向隐含在反向中
        const sx = this.dragStart.x, sy = this.dragStart.y;
        const ex = this.dragCurrent.x, ey = this.dragCurrent.y;
        const len = Math.min(Math.hypot(ex - sx, ey - sy), 250);
        if (len > 15) {
          ctx.strokeStyle = CONFIG.COLORS[this.currentPlayer]; ctx.lineWidth = 2; ctx.globalAlpha = 0.4;
          ctx.setLineDash([4, 6]);
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;
        } else {
          ctx.strokeStyle = CONFIG.COLORS[this.currentPlayer]; ctx.lineWidth = 3; ctx.setLineDash([5, 5]);
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke(); ctx.setLineDash([]);
        }
      }
    }

    for (const city of this.cities) this.drawCity(ctx, city);

    // AI 操作高亮指示器（仅AI模式）
    if (this.gameMode === 'ai' && this.aiHighlightTarget) {
      const t = this.aiHighlightTarget;
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
      ctx.strokeStyle = t.color || '#ff0';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.3 + pulse * 0.7;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r || 20, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    if (this.selectedCity) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.arc(this.selectedCity.x, this.selectedCity.y, 35, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
    }

    // 地图边界线（只在游戏中显示）
    if (this.state !== 'menu') {
      const zz = this.camera.zoom;
      const alpha = 0.25 + 0.35 * Math.max(0, 1 - zz);
      const bw = Math.max(1.5, 5 / zz);
      ctx.globalAlpha = alpha;
      ctx.setLineDash([18, 6]);
      ctx.strokeStyle = '#cc3333'; ctx.lineWidth = bw + 3;
      ctx.strokeRect(2, 2, CONFIG.MAP_W - 4, CONFIG.MAP_H - 4);
      ctx.setLineDash([]);
      ctx.strokeStyle = '#ff3333'; ctx.lineWidth = bw;
      ctx.strokeRect(0, 0, CONFIG.MAP_W, CONFIG.MAP_H);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // 找点离河流曲线最近处的t参数
  _findNearestRiverT(x, y, river) {
    if (river.points) {
      // 自定义地图：在点列表上找最近点
      let bestT = 0, bestDist = Infinity;
      const pts = river.points;
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b2 = pts[i + 1];
        const dx = b2.x - a.x, dy = b2.y - a.y, len = Math.hypot(dx, dy);
        if (len < 2) continue;
        const t = Math.max(0, Math.min(1, ((x - a.x) * dx + (y - a.y) * dy) / (len * len)));
        const px = a.x + t * dx, py = a.y + t * dy;
        const d = Math.hypot(x - px, y - py);
        if (d < bestDist) { bestDist = d; bestT = (i + t) / (pts.length - 1); }
      }
      return Math.max(0.05, Math.min(0.95, bestT));
    }
    let bestT = 0.5, bestDist = Infinity;
    for (let t = 0; t <= 1; t += 0.01) {
      const p = bezierPoint(t, river.p0, river.p1, river.p2, river.p3);
      const d = Math.hypot(x - p.x, y - p.y);
      if (d < bestDist) { bestDist = d; bestT = t; }
    }
    return bestT;
  }

  renderMenu() {
    if (!this._menuMapGenerated && this.state === 'menu') {
      this._menuMapGenerated = true;
      this.generateMap();
      this.state = 'menu';
      this.render();
    }
  }

  drawCity(ctx, city) {
    const x = city.x, y = city.y;
    const color = city.owner !== null ? CONFIG.COLORS[city.owner] : '#888';
    const isEnemy = city.owner !== null && city.owner !== this.currentPlayer;
    ctx.fillStyle = '#FCF9F2';
    ctx.strokeStyle = isEnemy ? color : (city.owner !== null ? '#333' : '#999'); ctx.lineWidth = 2.5;
    const w = 32, h = 20;
    sketchRect(ctx, x-w/2, y-h/2, w, h, 2);
    ctx.fillRect(x-w/2+1, y-h/2+1, w-2, h-2);
    for (let i = 0; i < 3; i++) {
      const bx = x - w/2 + 4 + i * (w-8)/2;
      ctx.beginPath();
      ctx.moveTo(jitter(bx-3,1.5), jitter(y-h/2,1.5));
      ctx.lineTo(jitter(bx-3,1.5), jitter(y-h/2-7,1.5));
      ctx.lineTo(jitter(bx+3,1.5), jitter(y-h/2-7,1.5));
      ctx.lineTo(jitter(bx+3,1.5), jitter(y-h/2,1.5));
      ctx.stroke(); ctx.fill();
    }
    ctx.fillStyle = '#FCF9F2';
    ctx.strokeStyle = city.owner !== null ? color : '#999';
    ctx.beginPath(); ctx.arc(x, jitter(y+h/2-3,1), 5, Math.PI, 0); ctx.stroke();
    if (city.owner !== null) {
      ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(jitter(x,1), jitter(y-h/2-7,1)); ctx.lineTo(jitter(x,1), jitter(y-h/2-18,1)); ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.moveTo(jitter(x,1), jitter(y-h/2-18,1)); ctx.lineTo(jitter(x+10,1.5), jitter(y-h/2-14,1.5)); ctx.lineTo(jitter(x,1), jitter(y-h/2-10,1.5)); ctx.closePath(); ctx.fill();
    }
    if (city.hasEmperor) {
      ctx.fillStyle = color; ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(jitter(x-5,1), jitter(y+2,1)); ctx.lineTo(jitter(x+5,1), jitter(y+2,1)); ctx.lineTo(jitter(x,1), jitter(y-7,1)); ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.fillStyle = '#000'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    if (city.owner !== null) ctx.fillText(city.hp, x, y - h/2 - 20);
    else ctx.fillText('空', x, y + h/2 + 12);
  }

  // =================== AI 回合方法 ===================

  aiAutoSetup() {
    const emptyCities = this.cities.filter(c => c.owner === null);
    if (emptyCities.length === 0) return;
    const cx = CONFIG.MAP_W / 2, cy = CONFIG.MAP_H / 2;
    emptyCities.sort((a, b) => Math.hypot(a.x - cx, a.y - cy) - Math.hypot(b.x - cx, b.y - cy));
    const chosen = emptyCities[0];
    this.handleSetupClick({ x: chosen.x, y: chosen.y });
  }

  setButtonsEnabled(enabled) {
    document.querySelectorAll('#bottomBar .btn').forEach(b => {
      b.disabled = !enabled;
      b.style.opacity = enabled ? '' : '0.4';
    });
  }

  aiLog(type, msg) {
    if (this.gameMode !== 'ai') return;
    const now = new Date();
    const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
    this.aiLogEntries.push({ type, msg, ts });
    if (this.aiLogEntries.length > 100) this.aiLogEntries.shift();
    const body = document.getElementById('aiLogBody');
    if (!body) return;
    const cls = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : type === 'warn' ? 'log-warn' : 'log-info';
    body.innerHTML += `<div class="log-entry"><span class="log-time">${ts}</span> <span class="${cls}">${msg}</span></div>`;
    body.scrollTop = body.scrollHeight;
  }

  toggleAILog() {
    const body = document.getElementById('aiLogBody');
    const toggle = document.getElementById('aiLogToggle');
    if (body.style.display === 'none') {
      body.style.display = 'block';
      toggle.textContent = '\u25BC';
    } else {
      body.style.display = 'none';
      toggle.textContent = '\u25B6';
    }
  }

  async startAITurn() {
    if (this.state !== 'playing') return;
    const p = this.players[this.currentPlayer];
    if (p.isHuman) return;
    if (!this.aiPlayer) return;

    this.aiThinking = true;
    this.setButtonsEnabled(false);
    this.showAIOverlay(true);
    this.aiLog('info', p.name + ' 回合开始...');

    const MAX_RETRIES = 3;
    let actions = null;
    for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
      try {
        actions = await this.aiPlayer.getActions();
        if (actions && actions.length > 0) break;
        this.aiLog('warn', '第' + attempt + '次返回空，尝试重试...');
      } catch (err) {
        console.error('AI turn error:', err);
        this.aiLog('err', '第' + attempt + '次失败: ' + err.message + (attempt < MAX_RETRIES ? '，重试中...' : ''));
        if (attempt < MAX_RETRIES) await new Promise(r => setTimeout(r, 1500));
      }
    }

    if (!actions || actions.length === 0) {
      this.aiLog('err', '连续' + MAX_RETRIES + '次失败，尝试盲出兵');
      // 盲出兵：从己方城池随机向地图中心出兵
      const myCities = this.cities.filter(c => c.owner === this.currentPlayer && c.hp > 0);
      if (myCities.length > 0) {
        const src = myCities[Math.floor(Math.random() * myCities.length)];
        const cx = CONFIG.MAP_W / 2 + (Math.random() - 0.5) * 400;
        const cy = CONFIG.MAP_H / 2 + (Math.random() - 0.5) * 300;
        // 拉弓式：dragCurrent 放在目标反方向
        const _blindAngle = Math.atan2(cy - src.y, cx - src.x);
        const _blindPull = _blindAngle + Math.PI;
        const _blindDist = Math.min(Math.hypot(cy - src.y, cx - src.x), 250);
        this.dragStart = { x: src.x, y: src.y, origin: src, originType: 'city', originTroopId: null, isTroopEnd: false };
        this.dragCurrent = { x: src.x + Math.cos(_blindPull) * _blindDist, y: src.y + Math.sin(_blindPull) * _blindDist };
        const ok = this.finishTroopDeploy();
        if (ok) {
          this.aiLog('ok', '盲出兵成功');
          this.aiThinking = false;
          this.setButtonsEnabled(true);
          return;
        }
      }
      this.aiThinking = false;
      this.setButtonsEnabled(true);
      this.endTurn();
      return;
    }

    this.aiActions = actions;
    this.aiActionIndex = 0;
    this.showAIOverlay(false);
    if (actions[0].action) {
      const a = actions[0];
      this.aiLog('ok', '决策: ' + a.action + ' ' + JSON.stringify(a.params).substring(0, 80));
      this.setActionText(p.name + ' (AI) 执行操作...');
      this.animateAIAction();
      return;
    } else {
      this.aiLog('warn', 'AI选择结束回合');
    }
    this.aiThinking = false;
    this.setButtonsEnabled(true);
    this.endTurn();
  }

  showAIOverlay(show) {
    const el = document.getElementById('aiThinkingOverlay');
    if (el) el.style.display = show ? 'flex' : 'none';
    if (show) {
      const tt = document.getElementById('aiThinkingText');
      const ts = document.getElementById('aiThinkingSub');
      if (tt) tt.textContent = 'AI 思考中...';
      if (ts) ts.textContent = '正在问大佬（API）';
    }
  }

  animateAIAction() {
    if (this.aiActionIndex >= this.aiActions.length) {
      // 所有 action 执行完 → endTurn
      this.aiThinking = false;
      this.setButtonsEnabled(true);
      this.setActionText(this.players[this.currentPlayer].name + ' (AI) 回合结束');
      this.aiHighlightTarget = null;
      this.render();
      setTimeout(() => this.endTurn(), 800);
      return;
    }
    const action = this.aiActions[this.aiActionIndex];
    const p = this.players[this.currentPlayer];
    const actionNames = {
      deploy_troop: '出兵', build_factory: '建造工厂', build_rope: '修绳子',
      build_dock: '修码头', build_ship: '造船', build_cannon: '造大炮',
      connect_wire: '连接引线', connect_supply: '补粮线',
      move_emperor: '移动皇帝', burn_rope: '烧绳子',
      place_cavalry: '部署骑兵', cannon_attack: '开炮'
    };
    const label = actionNames[action.action] || action.action;
    this.setActionText(p.name + ' (AI): ' + label + ' (步骤' + (this.aiActionIndex + 1) + '/' + this.aiActions.length + ')');
    const tt = document.getElementById('aiThinkingText');
    const ts = document.getElementById('aiThinkingSub');
    if (tt) tt.textContent = p.name + ' (AI)';
    if (ts) ts.textContent = '执行' + label + '...';
    this.showAIOverlay(true);

    this.aiHighlightTarget = this.getAIHighlight(action);
    this.render();

    setTimeout(() => {
      this.showAIOverlay(false);
      const ok = this.executeAIAction(action);
      if (!ok) {
        this.aiLog('warn', action.action + '失败');
        // 失败时重试：重新获取AI决策（最多重试2次）
        this.aiActionRetry = (this.aiActionRetry || 0) + 1;
        if (this.aiActionRetry <= 2) {
          this.aiLog('info', 'AI重新决策（重试' + this.aiActionRetry + '/2）...');
          this.aiActionIndex = 0;
          this.aiActions = [];
          setTimeout(() => this.startAITurn(), 400);
          return;
        }
        this.aiLog('err', 'AI多次尝试失败，结束回合');
      }
      // 检查是否出兵成功结束了回合
      if (this._aiTurnEnded) {
        this._aiTurnEnded = false;
        this.aiThinking = false;
        this.setButtonsEnabled(true);
        this.setActionText(p.name + ' (AI) 回合结束');
        this.aiHighlightTarget = null;
        this.render();
        setTimeout(() => this.endTurn(), 600);
        return;
      }
      this.aiActionRetry = 0;
      this.aiActionIndex++;
      this.aiHighlightTarget = null;
      this.render();
      if (this.aiActionIndex < this.aiActions.length) {
        setTimeout(() => this.animateAIAction(), 600);
      } else {
        this.aiThinking = false;
        this.setButtonsEnabled(true);
        this.setActionText(p.name + ' (AI) 回合结束');
        this.render();
        setTimeout(() => this.endTurn(), 600);
      }
    }, 1000);
  }

  getAIHighlight(action) {
    const p = action.params || {};
    switch (action.action) {
      case 'deploy_troop': return p.toX ? { x: p.toX, y: p.toY, r: 15, color: '#ff0' } : null;
      case 'build_factory': {
        const c = this.cities[p.cityId]; return c ? { x: c.x, y: c.y, r: 30, color: '#ff0' } : null;
      }
      case 'build_cannon': return { x: p.x, y: p.y, r: 12, color: '#f00' };
      case 'place_cavalry': return { x: p.x, y: p.y, r: 12, color: '#0f0' };
      case 'cannon_attack': return { x: p.targetX, y: p.targetY, r: 18, color: '#f00' };
      default: return null;
    }
  }

  executeAIAction(action) {
    const p = action.params || {};
    const me = this.currentPlayer;
    let endedTurn = false;
    let actionOk = true;
    this._aiTurnEnded = false;
    try {
      switch (action.action) {
        case 'deploy_troop': {
          // 安全检查：确保 currentPlayer 仍是当前 AI
          if (this.players[this.currentPlayer].isHuman) {
            this.aiLog('err', '当前是人类玩家回合，跳过AI出兵');
            actionOk = false;
            break;
          }
          let src = this.findDeploySource(me, p.fromX, p.fromY);
          if (!src) {
