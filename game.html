<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="纸上江山">
<meta name="theme-color" content="#FCF9F2">
<title>纸上江山</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #FCF9F2;
    overflow: hidden;
    font-family: 'Microsoft YaHei', sans-serif;
    height: 100%;
  }
  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: none;
  }
  #canvasWrap { position: relative; flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #FCF9F2; }
  canvas { display: block; cursor: crosshair; max-width: 100%; max-height: 100%; }
  #topBar {
    flex: 0 0 auto;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    z-index: 50;
    position: relative;
  }
  #topBar .playerInfo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #topBar .colorDot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid white;
  }
  #bottomBar {
    flex: 0 0 auto;
    background: rgba(0,0,0,0.85);
    padding: 6px 10px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 50;
    position: relative;
  }
  .btn {
    padding: 6px 12px;
    border: 2px solid #888;
    background: #34495e;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    font-weight: bold;
    min-width: 60px;
  }
  .btn:hover { background: #4a6278; border-color: #aaa; transform: scale(1.05); }
  .btn.active { background: #e74c3c; border-color: #c0392b; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.selected { background: #e74c3c; border-color: #c0392b; transform: scale(1.1); box-shadow: 0 0 10px rgba(231,76,60,0.5); }

  /* ==================== 主菜单古代战争风格 ==================== */
  @font-face {
    font-family: 'Ancient';
    src: local('KaiTi'), local('STKaiti'), local('SimSun');
  }
  #playerSelectOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  #modeSelectScreen {
    position: relative; z-index: 1;
    text-align: center;
    background: rgba(252, 249, 242, 0.9);
    padding: 40px 60px;
    border-radius: 8px;
    border: 1px solid rgba(139, 115, 85, 0.3);
  }

  /* 标题 */
  #modeSelectScreen h1 {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif;
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 8px;
    color: #4a3520;
    margin-bottom: 50px;
    user-select: none;
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  .mode-select-group {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin: 0;
  }
  .mode-btn {
    position: relative;
    width: 320px; height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #8b7355 !important;
    border-radius: 6px !important;
    background: #f5f0e8 !important;
    cursor: pointer;
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
    user-select: none;
  }
  .mode-btn::before {
    content: '';
    position: absolute; inset: -1px;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 7px;
    pointer-events: none;
  }
  .mode-btn:hover {
    border-color: #5a4a3a !important;
    background: #ede5d5 !important;
    transform: scale(1.02);
  }
  .mode-icon {
    font-size: 28px !important;
    margin-right: 12px;
  }
  .mode-title {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
    font-size: 24px !important;
    font-weight: bold;
    color: #4a3520 !important;
    letter-spacing: 4px;
  }
  .mode-desc { display: none !important; }

  /* 子画面（本地设置/AI设置/联机大厅）— 统一风格 */
  #localSetupScreen, #aiSetupScreen, #onlineLobbyScreen {
    position: relative; z-index: 1;
    text-align: center;
    background: rgba(252, 249, 242, 0.9);
    padding: 30px 50px;
    border-radius: 6px;
    border: 1px solid rgba(139, 115, 85, 0.3);
  }
  #localSetupScreen h1, #aiSetupScreen h1, #onlineLobbyScreen h1 {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif;
    font-size: 28px;
    color: #4a3520;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  #localSetupScreen p, #aiSetupScreen p, #onlineLobbyScreen p {
    color: #6b5a4a !important;
    font-size: 14px !important;
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
  }
  #playerSelectOverlay .subtitle {
    color: #a08050 !important;
    font-size: 14px !important;
  }
  .player-count-group .btn, .btn-sm {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
    font-size: 17px !important;
    letter-spacing: 2px;
    background: #f5f0e8 !important;
    border: 1px solid #b8a890 !important;
    color: #4a3520 !important;
    border-radius: 4px !important;
    padding: 8px 22px !important;
    transition: all 0.15s;
    min-width: auto !important;
    cursor: pointer !important;
  }
  .player-count-group .btn:hover, .btn-sm:hover {
    border-color: #8b7355 !important;
    background: #ede5d5 !important;
    color: #2a1a0a !important;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .player-count-group .btn.selected {
    background: #e0d5c0 !important;
    border-color: #6b5a4a !important;
    color: #1a0a00 !important;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
  }
  .btn-start, #btnStartGame {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
    font-size: 19px !important;
    letter-spacing: 3px;
    background: #e8dcc8 !important;
    border: 1px solid #8b7355 !important;
    color: #4a3520 !important;
    border-radius: 4px !important;
    padding: 10px 34px !important;
    transition: all 0.15s;
    cursor: pointer !important;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.1);
  }
  .btn-start:hover, #btnStartGame:hover {
    background: #dfd0b8 !important;
    color: #2a1a0a !important;
    border-color: #5a4a3a !important;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
    transform: translateY(-1px);
  }
  .btn-copy {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
    font-size: 14px !important;
    letter-spacing: 1px;
    background: #d4c5a9 !important;
    border: 1px solid #8b7355 !important;
    color: #3a2a1a !important;
    border-radius: 3px !important;
    padding: 6px 16px !important;
    cursor: pointer !important;
  }
  .btn-copy:hover {
    background: #c8b896 !important;
    color: #1a0a00 !important;
  }
  .btn-back {
    font-family: 'Ancient', 'KaiTi', 'STKaiti', serif !important;
    font-size: 15px !important;
    letter-spacing: 2px;
    background: #f0ebe0 !important;
    border: 1px solid #c8b8a0 !important;
    color: #6b5a4a !important;
    border-radius: 4px !important;
    cursor: pointer !important;
    min-width: auto !important;
  }
  .btn-back:hover {
    border-color: #8b7355 !important;
    color: #3a2a1a !important;
  }
  .setup-desc { color: #6b5a4a !important; text-align: center; }
  .room-code {
    font-family: 'Courier New', monospace !important;
    color: #4a3520 !important;
    text-align: center;
  }
  #onlineLobbyScreen input[type=text]:focus {
    border-color: #6b5a4a !important;
    box-shadow: 0 0 6px rgba(100,80,60,0.2);
  }
  .lobby-status { color: #6b5a4a !important; text-align: center; }

  /* 移动端适配：菜单 */
  @media (max-width: 768px), (max-height: 600px), (orientation: portrait) {
    #modeSelectScreen h1 { font-size: 32px !important; margin-bottom: 24px !important; letter-spacing: 8px; padding: 8px 30px !important; }
    .mode-btn { width: 200px !important; height: 64px !important; gap: 12px; }
    .mode-icon { font-size: 28px !important; }
    .mode-title { font-size: 18px !important; letter-spacing: 3px; }
  }

  /* 放置皇帝提示 - 附着在顶部栏下面，不拦截点击 */
  #emperorPrompt {
    position: absolute;
    top: 36px; /* topBar 高度之后 */
    left: 0; width: 100%;
    background: rgba(50, 40, 20, 0.82);
    padding: 6px 15px;
    color: white;
    text-align: center;
    z-index: 49;
    display: none;
    border-bottom: 1px solid rgba(255,200,80,0.3);
    pointer-events: none; /* 完全透明，不拦截任何点击 */
  }
  #emperorPrompt h2 { font-size: 15px; display: inline; margin-right: 10px; }
  #emperorPrompt p { font-size: 14px; display: inline; color: #ffd; }

  #gameOverOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 100;
    border-radius: 5px;
  }
  #gameOverOverlay h1 { font-size: 36px; margin-bottom: 15px; }

  /* ==================== 移动端适配 ==================== */
  @media (max-width: 768px), (max-height: 600px), (orientation: portrait) {
    #gameContainer { width: 100vw !important; height: 100% !important; display: flex !important; flex-direction: column !important; }
    #canvasWrap { flex: 1 1 auto !important; min-height: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; overflow: hidden !important; }
    #topBar { padding: 4px 8px !important; font-size: 11px !important; }
    #topBar .colorDot { width: 12px !important; height: 12px !important; }
    #bottomBar { padding: 3px 4px !important; gap: 2px !important; flex-wrap: wrap !important; }
    .btn { font-size: 11px !important; padding: 5px 7px !important; min-width: auto !important; border-radius: 3px !important; }
    #btnQuit { padding: 5px 10px !important; }
    #emperorPrompt { top: 32px !important; padding: 5px 10px !important; }
    #emperorPrompt h2 { font-size: 13px !important; }
    #emperorPrompt p { font-size: 12px !important; }
    #playerSelectOverlay h1 { font-size: 32px !important; margin-top: 40px !important; }
    .player-count-group .btn { font-size: 16px !important; padding: 10px 20px !important; }
    #modeSelectScreen h1 { font-size: 32px !important; margin-bottom: 24px !important; letter-spacing: 8px; }
    .mode-select-group { flex-direction: column !important; align-items: center !important; gap: 12px !important; }
    .mode-btn { width: 200px !important; height: 56px !important; padding: 0 20px !important; }
    .mode-icon { font-size: 28px !important; margin-right: 10px !important; }
    .mode-title { font-size: 16px !important; letter-spacing: 2px !important; }
    .btn-start { font-size: 15px !important; padding: 10px 28px !important; }
    .setup-desc { font-size: 12px !important; }
    #aiThinkingOverlay { top: 30px !important; bottom: 42px !important; }
    #aiLog { width: 150px !important; right: 2px !important; max-height: 200px !important; font-size: 10px !important; }
    #aiLogBody { max-height: 170px !important; }
    #editorBar .ed-tool { font-size: 10px !important; padding: 3px 5px !important; }
  }

  /* AI 日志面板 */
  #aiLog {
    position: absolute;
    top: 36px;
    right: 5px;
    width: 200px;
    max-height: 300px;
    background: rgba(0,0,0,0.85);
    border: 1px solid #555;
    border-radius: 6px;
    z-index: 55;
    font-size: 11px;
    color: #ccc;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #aiLogHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 8px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    font-weight: bold;
    color: #ffd700;
    font-size: 12px;
    user-select: none;
  }
  #aiLogToggle { font-size: 10px; }
  #aiLogBody {
    padding: 4px 8px;
    overflow-y: auto;
    max-height: 270px;
    line-height: 1.5;
  }
  #aiLogBody .log-entry { margin-bottom: 3px; padding-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  #aiLogBody .log-time { color: #666; font-size: 10px; }
  #aiLogBody .log-ok { color: #5f5; }
  #aiLogBody .log-err { color: #f55; }
  #aiLogBody .log-info { color: #5af; }
  #aiLogBody .log-warn { color: #fa5; }

  /* 触摸提示 */
  #touchHint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 100;
    display: none;
    pointer-events: none;
  }
  /* 联机大厅 */
  #onlineLobbyScreen { text-align: center; }
  #onlineLobbyScreen h1 { font-size: 28px; margin-bottom: 6px; }
  #onlineLobbyScreen p { font-size: 14px; color: #4a3520; margin-bottom: 14px; }
  #onlineLobbyScreen input[type=text] {
    background: #f5f0e8; border: 1px solid #b8a890;
    color: #222; caret-color: #222; padding: 8px 14px; border-radius: 6px; font-size: 15px;
    text-align: center; width: 160px; margin: 4px; outline: none;
  }
  #onlineLobbyScreen input[type=text]::placeholder { color: #999; }
  #onlineLobbyScreen input[type=text]:focus { border-color: #6b5a4a !important; }
  .room-code { font-size: 36px!important; font-weight: 900; color: #4a3520 !important;
    letter-spacing: 8px; margin: 16px 0; font-family: monospace; }
  .lobby-status { color: #4a3520; font-size: 13px; margin: 10px 0; min-height: 20px; }
  .btn-sm { font-size: 13px; padding: 6px 16px; margin: 6px; }
  .ed-tool {
    font-family: 'Microsoft YaHei', sans-serif !important;
    font-size: 12px !important;
    padding: 4px 7px !important;
    border: 1px solid #666 !important;
    border-radius: 5px !important;
    background: #e8dcc8;
    color: #333;
    cursor: pointer;
    white-space: nowrap;
  }
  .ed-tool.active { border-color: #e67e22 !important; background: #f5d6a8 !important; box-shadow: 0 0 8px #e67e22; }
  .btn-map-edit {
    font-family: 'Microsoft YaHei', sans-serif !important;
    font-size: 12px !important;
    letter-spacing: 0px !important;
    background: #b8a080 !important;
    border: 1px solid #8b7355 !important;
    color: #3a2a1a !important;
    border-radius: 3px !important;
    padding: 4px 8px !important;
  }
  #editorBar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: none; background: #e0d5c0; border-top: 1px solid #8b7355;
    padding: 4px 6px; z-index: 9999; align-items: center;
    flex-wrap: wrap; justify-content: center; gap: 3px;
  }
  #editorBar.show { display: flex; }
</style>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div id="gameContainer">
  <div id="canvasWrap"><canvas id="gameCanvas" width="1200" height="750"></canvas></div>

  <!-- 主菜单：模式选择 -->
  <div id="playerSelectOverlay" style="display:flex;">
    <!-- 模式选择画面 -->
    <div id="modeSelectScreen">
      <h1>纸上江山</h1>
      <div class="mode-select-group">
        <button class="btn mode-btn" onclick="game.selectGameMode('local')">
          <span class="mode-icon">⚔</span>
          <span class="mode-title">本地对战</span>
        </button>
        <button class="btn mode-btn" onclick="game.selectGameMode('ai')">
          <span class="mode-icon">🤖</span>
          <span class="mode-title">AI对战</span>
        </button>
        <button class="btn mode-btn" onclick="game.selectGameMode('online')">
          <span class="mode-icon">🏠</span>
          <span class="mode-title">局域网联机</span>
        </button>
      </div>
    </div>

    <!-- 本地对战设置 -->
    <div id="localSetupScreen" style="display:none;">
      <h1>本地对战</h1>
      <p>选择玩家人数</p>
      <div class="player-count-group">
        <button class="btn" id="pc2" onclick="game.selectPlayerCount(2)">2 人</button>
        <button class="btn" id="pc3" onclick="game.selectPlayerCount(3)">3 人</button>
        <button class="btn" id="pc4" onclick="game.selectPlayerCount(4)">4 人</button>
      </div>
      <br>
      <button class="btn btn-back" onclick="game.backToModeSelect()">返回</button>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-start" onclick="game.startGame()">开始游戏</button>
        <button class="btn btn-start btn-map-edit" onclick="game.openMapEditor()">🗺 绘制</button>
      </div>
    </div>

    <!-- AI 对战设置 -->
    <div id="aiSetupScreen" style="display:none;">
      <h1>AI 对战</h1>
      <p>选择人类玩家数量</p>
      <div class="player-count-group" id="humanCountGroup">
        <button class="btn" id="pc1_ai" onclick="game.selectAIHumanCount(1)">1 人</button>
        <button class="btn" id="pc2_ai" onclick="game.selectAIHumanCount(2)">2 人</button>
        <button class="btn" id="pc3_ai" onclick="game.selectAIHumanCount(3)">3 人</button>
      </div>
      <p>选择 AI 对手数量</p>
      <div class="player-count-group" id="aiCountGroup">
        <button class="btn" id="ai1" onclick="game.selectAICount(1)">1 AI</button>
        <button class="btn" id="ai2" onclick="game.selectAICount(2)">2 AI</button>
        <button class="btn" id="ai3" onclick="game.selectAICount(3)">3 AI</button>
      </div>
      <p id="aiSetupDesc"></p>
      <br>
      <button class="btn btn-back" onclick="game.backToModeSelect()">返回</button>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-start" onclick="game.startGame()">开始游戏</button>
        <button class="btn btn-start btn-map-edit" onclick="game.openMapEditor()">🗺 绘制</button>
      </div>
    </div>

    <!-- 联机大厅 -->
    <div id="onlineLobbyScreen" style="display:none;">
      <h1>局域网联机</h1>
      <!-- 第一步：创建或加入 -->
      <div id="onlineMainButtons">
        <button class="btn btn-start" onclick="game.showHostSetup()">创建房间</button>
        <button class="btn btn-start" onclick="game.showJoinSetup()">加入房间</button>
        <br>
        <button class="btn btn-back" onclick="game.backToModeSelect()" style="margin-top:8px;">返回</button>
      </div>
      <!-- 第二步：房主设置（昵称+人数） -->
      <div id="onlineHostSetup" style="display:none;">
        <p style="font-size:13px;">昵称</p>
        <input type="text" id="onlineNameInput" placeholder="输入你的昵称" maxlength="6" style="width:140px;padding:5px 10px;font-size:14px;text-align:center;color:#333;background:#f5f0e8;border:1px solid #8b7355;border-radius:4px;">
        <br><br>
        <p>选择真人数量</p>
        <div class="player-count-group" id="onlinePlayerCountGroup">
          <button class="btn" id="ol2" onclick="game.selectOnlinePlayerCount(2)">2 真人</button>
          <button class="btn" id="ol3" onclick="game.selectOnlinePlayerCount(3)">3 真人</button>
          <button class="btn" id="ol4" onclick="game.selectOnlinePlayerCount(4)">4 真人</button>
        </div>
        <p>选择 AI 数量</p>
        <div class="player-count-group" id="onlineAICountGroup">
          <button class="btn" id="olAI0" onclick="game.selectOnlineAICount(0)">0 AI</button>
          <button class="btn" id="olAI1" onclick="game.selectOnlineAICount(1)">1 AI</button>
          <button class="btn" id="olAI2" onclick="game.selectOnlineAICount(2)">2 AI</button>
          <button class="btn" id="olAI3" onclick="game.selectOnlineAICount(3)">3 AI</button>
        </div>
        <p id="onlineSetupDesc" style="font-size:13px;"></p>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-start" onclick="game.createRoom()">创建</button>
          <button class="btn btn-map-edit" onclick="game.openMapEditor()" style="background:#5D4E37;border-color:#8B7355;font-size:13px;padding:6px 14px;">🗺 绘制</button>
        </div>
        <br>
        <button class="btn btn-back" onclick="game.leaveLobby()">返回</button>
      </div>
      <!-- 第二步：加入者设置（昵称+房间码） -->
      <div id="onlineJoinSetup" style="display:none;">
        <p style="font-size:13px;">昵称</p>

<script>
// ==================== 移动端检测 ====================
var _sw = window.innerWidth || screen.width || 375;
var _sh = window.innerHeight || screen.height || 667;
var _isMobileDevice = (_sw <= 768) || (_sh > _sw) || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// ==================== 全屏适配 + 相机缩放 ====================
function resizeCanvas() {
  var cv = document.getElementById('gameCanvas');
  var wrap = document.getElementById('canvasWrap');
  if (!cv || !wrap) return;
  var rw = wrap.clientWidth, rh = wrap.clientHeight;
  if (rw <= 0 || rh <= 0) return;
  var mapW = CONFIG.MAP_W, mapH = CONFIG.MAP_H;
  var s = Math.min(rw / mapW, rh / mapH);
  cv.style.width = (mapW * s) + 'px';
  cv.style.height = (mapH * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', resizeCanvas);

// ==================== 配置 ====================
const CONFIG = {
  MAP_W: _isMobileDevice ? 1000 : 1600,
  MAP_H: _isMobileDevice ? 1600 : 1000,
  CITY_COUNT: 20, MOUNTAIN_COUNT: 6, RIVER_COUNT: 2,
  PLAYERS: 4,
  TROOP_HP: 2, TROOP_ATK: 1,
  CAVALRY_HP: 2, CAVALRY_ATK: 3,
  CAVALRY_UNIT_HP: 3,
  FACTORY_HP: 3,
  CANNON_HP: 1, CANNON_ATK: 3, CANNON_RANGE: 70,
  WIRE_HP: 1,
  SUPPLY_SEGMENTS: 3,
  SEGMENT_LEN: 40,
  COLORS: ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'],
  COLOR_NAMES: ['红色', '蓝色', '绿色', '橙色'],
  MIN_DIST_CITY: 100,
  MIN_DIST_MOUNTAIN: 120
};

// 同步更新 canvas 元素尺寸
(function updateCanvasSize() {
  var cv = document.getElementById('gameCanvas');
  if (cv) {
    cv.width = CONFIG.MAP_W;
    cv.height = CONFIG.MAP_H;
  }
})();

// ==================== 工具函数 ====================
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function distToPoint(px, py, x, y) { return Math.hypot(px - x, py - y); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max)); }

function pointToLineDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function linesIntersect(a1, a2, b1, b2) {
  const d = (a2.x - a1.x) * (b2.y - b1.y) - (a2.y - a1.y) * (b2.x - b1.x);
  if (d === 0) return false;
  const t = ((b1.x - a1.x) * (b2.y - b1.y) - (b1.y - a1.y) * (b2.x - b1.x)) / d;
  const u = ((b1.x - a1.x) * (a2.y - a1.y) - (b1.y - a1.y) * (a2.x - a1.x)) / d;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

// 线段到圆最近距离：计算线段上最近点到圆心的距离
function lineCircleMinDist(x1, y1, x2, y2, cx, cy) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(x1 - cx, y1 - cy);
  let t = ((cx - x1) * dx + (cy - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot((x1 + t * dx) - cx, (y1 + t * dy) - cy);
}

// 整条折线路径是否穿过圆形（线段与圆相交，不只是端点距离）
function pathTouchesCircle(pts, cx, cy, r) {
  for (let i = 0; i < pts.length - 1; i++) {
    if (lineCircleMinDist(pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y, cx, cy) < r) return true;
  }
  return false;
}

function bezierPoint(t, p0, p1, p2, p3) {
  const u = 1 - t;
  return {
    x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y
  };
}

// ===== 手绘风格工具 =====
function jitter(v, amt) { return v + (Math.random() - 0.5) * amt * 2; }
function sketchLine(ctx, x1, y1, x2, y2, j) {
  j = j || 2; ctx.beginPath(); ctx.moveTo(jitter(x1,j), jitter(y1,j));
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  ctx.lineTo(jitter(mx,j), jitter(my,j));
  ctx.lineTo(jitter(x2,j), jitter(y2,j)); ctx.stroke();
}
function sketchRect(ctx, x, y, w, h, j) {
  j = j || 2;
  ctx.beginPath();
  ctx.moveTo(jitter(x,j), jitter(y,j));
  ctx.lineTo(jitter(x+w,j), jitter(y,j));
  ctx.lineTo(jitter(x+w,j), jitter(y+h,j));
  ctx.lineTo(jitter(x,j), jitter(y+h,j));
  ctx.closePath(); ctx.stroke();
}

function getRiverPoints(river, step = 0.02) {
  if (river.points) return river.points; // 自定义地图（点列表格式）
  // 生成地图（贝塞尔格式）
  const pts = [];
  for (let t = 0; t <= 1; t += step) pts.push(bezierPoint(t, river.p0, river.p1, river.p2, river.p3));
  return pts;
}

function getRiverAngleAt(river, t, offset = 0) {
  // 返回河流在 t 位置的角度（弧度）
  if (river.points) {
    const pts = river.points, len = pts.length;
    const idx = Math.floor(t * (len - 1));
    const i = Math.max(0, Math.min(len - 2, idx));
    const a = pts[i], b = pts[i + 1];
    return Math.atan2(b.y - a.y, b.x - a.x) + offset;
  }
  // 贝塞尔格式
  const dt = 0.01;
  const t0 = Math.max(0, t - dt), t1 = Math.min(1, t + dt);
  const a = bezierPoint(t0, river.p0, river.p1, river.p2, river.p3);
  const b = bezierPoint(t1, river.p0, river.p1, river.p2, river.p3);
  return Math.atan2(b.y - a.y, b.x - a.x) + offset;
}

function pointNearRiver(px, py, river, threshold = 20) {
  const pts = river.points || getRiverPoints(river, 0.03);
  for (let i = 0; i < pts.length - 1; i++) {
    if (pointToLineDist(px, py, pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y) < threshold) return true;
  }
  return false;
}

function mountainNearRiver(points, rivers, threshold = 40) {
  // 检查山的所有关键点是否离任何河流太近
  for (const pt of points) {
    for (const river of rivers) {
      if (pointNearRiver(pt.x, pt.y, river, threshold)) return true;
    }
  }
  return false;
}

function pointOnMountain(px, py, mtn) {
  const pts = mtn.points;
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i].x, yi = pts[i].y;
    const xj = pts[j].x, yj = pts[j].y;
    const intersect = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// ==================== 联机网络层（WebSocket 信令 + 房间码） ====================
// ==================== 联机网络层（PeerJS 信令，无需服务器） ====================
class NetworkManager {
  constructor() {
    this.myPeer = null;
    this.myIndex = 0;
    this.myName = '';
    this.isHost = false;
    this.peers = [];           // [{ dc, connected, index }]
    this.onDataCallback = null;
    this.onConnectedCallback = null;
    this.onDisconnectedCallback = null;
    this.onRoomCreatedCallback = null;
    this.onPeerJoinedCallback = null;
    this.onStatusCallback = null;
  }

  get connectedPeers() {
    return this.peers.filter(p => p.connected).length;
  }
  get totalConnected() {
    return 1 + this.connectedPeers;
  }

  _status(msg) {
    console.log('[net]', msg);
    if (this.onStatusCallback) this.onStatusCallback(msg);
  }

  // 房主：创建房间
  createRoom(code) {
    this.isHost = true;
    this.myIndex = 0;
    this.roomCode = code;
    this.peerId = 'pw-' + code;
    this._status('创建房间中...');
    this.myPeer = new Peer(this.peerId, { debug: 0 });
    this.myPeer.on('open', () => {
      this._status('房间已创建');
      if (this.onRoomCreatedCallback) this.onRoomCreatedCallback(code);
    });
    this.myPeer.on('connection', (dc) => {
      const idx = this.peers.length;
      const peer = { dc, connected: false, index: idx };
      this.peers.push(peer);
      this._setupDC(peer, idx);
      if (this.onPeerJoinedCallback) this.onPeerJoinedCallback(idx);
    });
    this.myPeer.on('error', (err) => {
      this._status('错误: ' + err.message);
    });
  }

  // 加入者：加入房间
  joinRoom(code) {
    this.isHost = false;
    this.myIndex = 0;
    this.roomCode = code;
    this.peerId = 'pw-join-' + code + '-' + Date.now();
    this._status('正在加入...');
    this.myPeer = new Peer(this.peerId, { debug: 0 });
    this.myPeer.on('open', () => {
      this._status('连接房间中...');
      const dc = this.myPeer.connect('pw-' + code, { reliable: true });
      const peer = { dc, connected: false, index: 0 };
      this.peers = [peer];
      this._setupDC(peer, 0);
    });
    this.myPeer.on('error', (err) => {
      this._status('加入失败: ' + err.message);
      // 同步到UI
      const el = document.getElementById('lobbyStatus');
      if (el) el.textContent = '加入失败: ' + err.message;
    });
  }

  _setupDC(peer, idx) {
    peer.dc.on('open', () => {
      peer.connected = true;
      if (this.onConnectedCallback) this.onConnectedCallback(idx);
      if (!this.isHost && this.onPeerJoinedCallback) this.onPeerJoinedCallback(idx);
    });
    peer.dc.on('close', () => {
      peer.connected = false;
      if (this.onDisconnectedCallback) this.onDisconnectedCallback(idx);
    });
    peer.dc.on('data', (data) => {
      if (this.onDataCallback) this.onDataCallback(JSON.parse(data), idx);
    });
  }

  send(data, excludeIndex) {
    for (const peer of this.peers) {
      if (peer.connected && peer.dc && peer.dc.open && peer.index !== excludeIndex) {
        peer.dc.send(JSON.stringify(data));
      }
    }
  }

  sendTo(data, targetIndex) {
    const peer = this.peers.find(p => p.index === targetIndex);
    if (peer && peer.connected && peer.dc && peer.dc.open) {
      peer.dc.send(JSON.stringify(data));
    }
  }

  onConnected(cb) { this.onConnectedCallback = cb; }
  onData(cb) { this.onDataCallback = cb; }
  onDisconnected(cb) { this.onDisconnectedCallback = cb; }
  onRoomCreated(cb) { this.onRoomCreatedCallback = cb; }
  onPeerJoined(cb) { this.onPeerJoinedCallback = cb; }
  onStatus(cb) { this.onStatusCallback = cb; }

  disconnect() {
    for (const peer of this.peers) {
      if (peer.dc) peer.dc.close();
    }
    this.peers = [];
    if (this.myPeer) { this.myPeer.destroy(); this.myPeer = null; }
  }
}

  selectPlayerCount(n) {

    document.querySelectorAll('#localSetupScreen .player-count-group .btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('pc' + n);
    if (btn) btn.classList.add('selected');
  }

  selectGameMode(mode) {
    this.gameMode = mode;
    document.getElementById('modeSelectScreen').style.display = 'none';
    if (mode === 'local') {
      document.getElementById('localSetupScreen').style.display = 'block';
      this.selectedPlayerCount = 4;
      this.selectPlayerCount(4);
    } else if (mode === 'ai') {
      document.getElementById('aiSetupScreen').style.display = 'block';
      this.selectAIHumanCount(1);
    } else if (mode === 'online') {
      document.getElementById('onlineLobbyScreen').style.display = 'block';
      document.getElementById('onlineMainButtons').style.display = '';
      document.getElementById('onlineHostSetup').style.display = 'none';
      document.getElementById('onlineJoinSetup').style.display = 'none';
      document.getElementById('roomLobbyArea').style.display = 'none';
      this.onlineTotalPlayers = 2;
      this.onlineAICount = 0;
      this.selectOnlinePlayerCount(2);
      this.selectOnlineAICount(0);
    }
  }

  selectOnlinePlayerCount(n) {
    this.onlineTotalPlayers = n;
    document.querySelectorAll('#onlinePlayerCountGroup .btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('ol' + n);
    if (btn) btn.classList.add('selected');
    // 总人数最多4，限制AI最大数量
    const maxAI = 4 - n;
    const btns = document.querySelectorAll('#onlineAICountGroup .btn');
    btns.forEach(b => {
      const aiN = parseInt(b.textContent);
      b.style.display = (aiN <= maxAI) ? '' : 'none';
    });
    if (this.onlineAICount > maxAI) this.selectOnlineAICount(maxAI);
    this._updateOnlineDesc();
  }

  selectOnlineAICount(n) {
    this.onlineAICount = n;
    document.querySelectorAll('#onlineAICountGroup .btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('olAI' + n);
    if (btn) btn.classList.add('selected');
    this._updateOnlineDesc();
  }

  _updateOnlineDesc() {
    const human = this.onlineTotalPlayers;
    const ai = this.onlineAICount;
    document.getElementById('onlineSetupDesc').textContent = human + ' 真人 + ' + ai + ' AI  = ' + (human + ai) + ' 人';
  }

  backToModeSelect() {
    this.gameMode = 'local';
    this.customMap = null;
    if (this.network) { this.network.disconnect(); this.network = null; }
    document.getElementById('playerSelectOverlay').style.display = 'flex';
    document.getElementById('modeSelectScreen').style.display = 'block';
    document.getElementById('localSetupScreen').style.display = 'none';
    document.getElementById('aiSetupScreen').style.display = 'none';
    document.getElementById('onlineLobbyScreen').style.display = 'none';
    document.getElementById('btnQuit').style.display = 'none';
    document.getElementById('topBar').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('aiLog').style.display = 'none';
  }

  // === 联机大厅（PeerJS 信令 + 4位房间码） ===
  _genRoomCode() { return String(1000 + Math.floor(Math.random() * 9000)); }

  showHostSetup() {
    document.getElementById('onlineMainButtons').style.display = 'none';
    document.getElementById('onlineHostSetup').style.display = '';
  }

  showJoinSetup() {
    document.getElementById('onlineMainButtons').style.display = 'none';
    document.getElementById('onlineJoinSetup').style.display = '';
  }

  createRoom() {
    const total = this.onlineTotalPlayers;
    this.myPlayerIndex = 0;
    const code = this._genRoomCode();
    const name = document.getElementById('onlineNameInput').value.trim() || '房主';
    document.getElementById('onlineHostSetup').style.display = 'none';
    document.getElementById('roomLobbyArea').style.display = '';
    document.getElementById('roomCodeDisplay').textContent = '----';
    document.getElementById('btnStartOnline').style.display = 'none';
    document.getElementById('lobbyStatus').textContent = '正在创建房间...';
    this.network = new NetworkManager();
    this.network.myName = name;
    this._setupOnlineDataHandler();
    this.network.onRoomCreated((c) => {
      document.getElementById('roomCodeDisplay').textContent = code;
      document.getElementById('lobbyStatus').textContent = '等待玩家加入...（1/' + total + ' 人，告知对方房间码）';
      this._updateLanPlayerList();
    });
    this.network.onPeerJoined((idx) => {
      this._updateLanPlayerList();
    });
    this.network.onConnected((idx) => {
      const connected = this.network.totalConnected;
      // 发送 room_info 给新加入的玩家（告知其序号和当前人数）
      this.network.sendTo({ type: 'room_info', current: connected, total: total, yourIndex: idx + 1 }, idx);
      // 通知其他已连接玩家（排除新来的）
      if (connected > 2) {
        this.network.send({ type: 'room_info', current: connected, total: total }, idx);
      }
      this._updateLanPlayerList();
      if (connected >= total) {
        document.getElementById('btnStartOnline').style.display = '';
        document.getElementById('lobbyStatus').textContent = '全部到齐！可以开始游戏了';
      } else {
        document.getElementById('lobbyStatus').textContent = '新玩家加入！(' + connected + '/' + total + ')';
      }
    });
    this.network.onDisconnected(() => {
      if (this.state === 'playing') this.setActionText('对手断开连接！');
      this._updateLanPlayerList();
    });
    this.network.createRoom(code);
  }

  hostStartGame() {
    this.network.send({ type: 'start_game' });
    this.startOnlineGame();
  }

  joinRoom() {
    const code = document.getElementById('roomCodeInput').value.trim();
    if (code.length !== 4) { alert('请输入4位房间码'); return; }
    const name = document.getElementById('onlineJoinNameInput').value.trim() || '玩家';
    document.getElementById('onlineJoinSetup').style.display = 'none';
    document.getElementById('roomLobbyArea').style.display = '';
    document.getElementById('roomCodeDisplay').textContent = code;
    document.getElementById('btnStartOnline').style.display = 'none';
    document.getElementById('lobbyStatus').textContent = '正在加入房间...';
    this.network = new NetworkManager();
    this.network.myName = name;
    this._setupOnlineDataHandler();
    this.network.onConnected(() => {
      document.getElementById('lobbyStatus').textContent = '已连接！等待房主开始游戏...';
      this._updateLanPlayerList();
    });
    this.network.onPeerJoined(() => { this._updateLanPlayerList(); });
    this.network.onDisconnected(() => {
      if (this.state === 'playing') this.setActionText('对手断开连接！');
      const el = document.getElementById('lobbyStatus');
      if (el) el.textContent = '连接断开';
    });
    this.network.joinRoom(code);
  }

  _updateLanPlayerList() {
    if (!this.network) return;
    const el = document.getElementById('onlinePlayerList');
    if (!el) return;
    const total = this.onlineTotalPlayers;
    let html = '<div>✓ 你</div>';
    for (const peer of this.network.peers) {
      const n = peer.index + 2;
      if (peer.connected) {
        html += '<div style="color:#27ae60;">✓ 玩家' + n + '</div>';
      } else {
        html += '<div style="color:#999;">○ 玩家' + n + ' (连接中...)</div>';
      }
    }
    const connected = 1 + this.network.peers.filter(p => p.connected).length;
    for (let i = connected; i < total; i++) {
      html += '<div style="color:#999;">○ 等待加入...</div>';
    }
    el.innerHTML = html;
  }

  _setupOnlineDataHandler() {
    this.network.onData((data, srcIdx) => {
      // 加入者：收到 room_info 后更新自己的序号和当前人数
      if (data.type === 'room_info') {
        if (data.yourIndex !== undefined) this.myPlayerIndex = data.yourIndex;
        document.getElementById('lobbyStatus').textContent = '已加入房间（' + data.current + '/' + data.total + ' 人），等待房主开始...';
        return;
      }
      if (data.type === 'start_game') { this.startOnlineGame(); return; }
      if (data.type === 'map') {
        this.cities = data.mapData.cities;
        this.mountains = data.mapData.mountains;
        this.rivers = data.mapData.rivers;
        if (data.config) this._onlineConfig = data.config;
        if (data.myPlayerIndex !== undefined) this.myPlayerIndex = data.myPlayerIndex;
        this._onlineMapReceived = true;
        // 如果游戏已启动（start_game 先到达），立即刷新地图
        if (this._onlineGameStarted) this.render();
        return;
      }
      if (!this._onlineGameStarted) return;
      this._handleRemoteAction(data, srcIdx);
    });
  }

  leaveLobby() {
    if (this.network) { this.network.disconnect(); this.network = null; }
    this.myPlayerIndex = 0;
    this._onlineGameStarted = false;
    document.getElementById('onlineMainButtons').style.display = '';
    document.getElementById('onlineHostSetup').style.display = 'none';
    document.getElementById('onlineJoinSetup').style.display = 'none';
    document.getElementById('roomLobbyArea').style.display = 'none';
    document.getElementById('btnStartOnline').style.display = 'none';
    document.getElementById('lobbyStatus').textContent = '';
    document.getElementById('onlinePlayerList').innerHTML = '';
  }

  startOnlineGame() {
    this._onlineGameStarted = true;
    document.getElementById('playerSelectOverlay').style.display = 'none';
    document.getElementById('onlineLobbyScreen').style.display = 'none';
    document.getElementById('topBar').style.display = '';
    document.getElementById('btnQuit').style.display = '';
    document.getElementById('bottomBar').style.display = '';
    this.state = 'playing';

    if (this.myPlayerIndex === 0) {
      // 主机：立即知道配置，初始化玩家并发送地图
      const total = this.onlineTotalPlayers + this.onlineAICount;
      const aiCount = this.onlineAICount;
      this._initOnlinePlayers(total, aiCount);
      this._menuMapGenerated = false;
      this.generateMap();
      const mapData = { cities: this.cities, mountains: this.mountains, rivers: this.rivers };
      let joinIdx = 1;
      for (const peer of this.network.peers) {
        if (peer.connected) {
          this.network.sendTo({ type: 'map', mapData: mapData, myPlayerIndex: joinIdx, config: { total, ai: aiCount } }, peer.index);
          joinIdx++;
        }
      }
      this._onlineMapReceived = true;
    } else {
      // 非主机：等收到 map（含 config）后再初始化玩家
      this._onlineMapReceived = this.cities.length > 0 && !!this._onlineConfig;
    }

    if (this._onlineMapReceived) {
      this._startOnlinePlay();
    } else {
      const checkMap = setInterval(() => {
        if (this._onlineMapReceived && this._onlineConfig) {
          clearInterval(checkMap);
          this._startOnlinePlay();
        }
      }, 200);
    }

    this.render();
  }

  _initOnlinePlayers(total, aiCount) {
    this.selectedPlayerCount = total;
    CONFIG.PLAYERS = total;
    this.players = [];
    for (let i = 0; i < total; i++) {
      const isAI = (i >= total - aiCount);
      const isMe = (i === this.myPlayerIndex);
      let name = CONFIG.COLOR_NAMES[i];
      if (isMe) name = this.network.myName + '(你)';
      else if (!isAI) name = '玩家' + (i + 1);
      else name = 'AI-' + CONFIG.COLOR_NAMES[i];
      this.players.push({
        id: i, color: CONFIG.COLORS[i], name: name,
        alive: true, emperorCityId: null, cities: [], factories: [],
        isHuman: !isAI
      });
    }
  }

  _startOnlinePlay() {
    // 非主机：此时 _onlineConfig 已经就绪，初始化玩家列表
    if (this.myPlayerIndex !== 0 && this._onlineConfig) {
      this._initOnlinePlayers(this._onlineConfig.total, this._onlineConfig.ai);
    }
    this.currentPlayer = 0;
    this.turn = 1;
    this.setupPlayer = 0;
    if (this.myPlayerIndex === 0) {
      this._processEmperors();
    } else {
      this.setActionText('等待房主开始...');
      this.setButtonsEnabled(false);
    }
  }

  // ===== 皇帝放置：单一驱动函数（主机调用；加入者收到 your_turn 后调用）=====
  _processEmperors() {
    // 所有人都有皇帝了 → 开始正常回合
    if (this.players.length > 0 && this.players.every(p => p.emperorCityId != null)) {
      document.getElementById('emperorPrompt').style.display = 'none';
      this._emperorClickHandler = null;
      if (this.myPlayerIndex === 0) this._startOnlineTurns();
      return;
    }

    // 找下一个没皇帝的玩家
    let idx = 0;
    while (idx < this.players.length && this.players[idx].emperorCityId != null) idx++;
    if (idx >= this.players.length) return;
    const player = this.players[idx];

    // AI：仅主机自动放置，然后继续下一个
    if (!player.isHuman) {
      if (this.myPlayerIndex === 0) {
        const empty = this.cities.filter(c => !c.owner && !c.hasEmperor);
        if (empty.length > 0) {
          const city = empty[Math.floor(Math.random() * empty.length)];
          this._doEmperorPlace(idx, city.id);
          this.network.send({ type: 'place_emperor', cityId: city.id, player: idx });
        }
        setTimeout(() => this._processEmperors(), 50);
      }
      return;
    }

    // 本地玩家回合 → 显示放置界面
    if (idx === this.myPlayerIndex) {
      this._showEmperorPlaceUI(idx);
      return;
    }

    // 主机：通知远程玩家轮到ta了
    if (this.myPlayerIndex === 0) {
      this.network.send({ type: 'your_turn', player: idx });
      this.setActionText('等待 ' + player.name + ' 放置皇帝...');
    }
    this.setButtonsEnabled(false);
    this._emperorClickHandler = null;
    this.render();
  }

  // 本地状态：放置皇帝
  _doEmperorPlace(playerIdx, cityId) {
    const city = this.cities[cityId];
    if (!city || city.owner != null) return;
    city.owner = playerIdx;
    city.hasEmperor = true;
    city.hp = 5;
    this.players[playerIdx].emperorCityId = cityId;
    if (!this.players[playerIdx].cities.includes(cityId)) {
      this.players[playerIdx].cities.push(cityId);
    }
  }

  // 显示皇帝放置界面
  _showEmperorPlaceUI(playerIdx) {
    const player = this.players[playerIdx];
    this.currentPlayer = playerIdx;
    this.state = 'playing';
    document.getElementById('emperorPrompt').style.display = 'block';
    document.getElementById('emperorText').textContent =
      `玩家 ${playerIdx + 1} (${CONFIG.COLOR_NAMES[playerIdx]}) - 请点击一座空城放置皇帝`;
    document.getElementById('emperorTitle').style.color = CONFIG.COLORS[playerIdx];
    this.setButtonsEnabled(true);

    this._emperorClickHandler = (pos) => {
      const city = this._findCityAt(pos.x, pos.y);
      if (!city || city.owner !== null || city.hasEmperor) {
        this.setActionText('请点击一座空城放置皇帝');
        return;
      }
      this._doEmperorPlace(playerIdx, city.id);
      this.setActionText(player.name + '已放置皇帝');
      this._emperorClickHandler = null;
      this.setButtonsEnabled(false);
      document.getElementById('emperorPrompt').style.display = 'none';

      // 通知主机（主机收到后会 relay + 继续；加入者发送后等待）
      this.network.send({ type: 'place_emperor', cityId: city.id, player: playerIdx });
      this.render();

      // 主机：继续下一个
      if (this.myPlayerIndex === 0) {
        this._processEmperors();
      }
    };
    this.render();
  }

  _findCityAt(x, y) {
    for (const city of this.cities) {
      if (distToPoint(x, y, city.x, city.y) < 35) return city;
    }
    return null;
  }

  _startOnlineTurns() {
    this.state = 'playing';
    this.currentPlayer = 0;
    this.turn = 1;
    this._emperorClickHandler = null;
    this._emperorDragStart = null;
    this.setMode(null);
    this.render();
    this._syncTurnState();
  }

  _syncTurnState() {
    this.updateUI();
    const player = this.players[this.currentPlayer];
    if (player && !player.isHuman) {
      // AI回合：仅主机执行，远程等待
      this.setButtonsEnabled(false);
      this.setActionText(player.name + ' 思考中...');
      if (this.myPlayerIndex === 0) {
        setTimeout(() => this.startAITurn(), 600);
      }
      return;
    }
    if (this.currentPlayer === this.myPlayerIndex) {
      this.setButtonsEnabled(true);
      this.setActionText('轮到你了');
    } else {
      this.setButtonsEnabled(false);
      this.setActionText('等待对手操作...');
    }
  }

  _handleRemoteAction(data, srcIdx) {
    if (data.type === 'full_state') {
      // 主机：转发给所有其他玩家（排除来源，避免回路）
      if (this.myPlayerIndex === 0 && srcIdx !== undefined) {
        this.network.send(data, srcIdx);
      }
      this._applyState(data.state);
      this.currentPlayer = data.currentPlayer;
      this.turn = data.turn;
      this._syncTurnState();
      this.render();
    } else if (data.type === 'place_emperor') {
      this._doEmperorPlace(data.player, data.cityId);
      if (this.myPlayerIndex === 0) {
        // 主机：转发给其他玩家（排除来源），继续驱动
        if (srcIdx !== undefined) this.network.send(data, srcIdx);
        this._processEmperors();
      } else {
        this.render();
      }
    } else if (data.type === 'your_turn') {
      if (data.player === this.myPlayerIndex) {
        this._processEmperors();
      }
    }
  }

  _syncAction(actionData) {
    if (this.network && this.network.connectedPeers > 0 && this.currentPlayer === this.myPlayerIndex) {
      this.network.send(actionData);
    }
  }

  selectAIHumanCount(n) {
    this.humanPlayerCount = n;
    document.querySelectorAll('#humanCountGroup .btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('pc' + n + '_ai');
    if (btn) btn.classList.add('selected');
    if (this.aiPlayerCount === undefined) {
      this.aiPlayerCount = 4 - n;
      const aiBtn = document.getElementById('ai' + this.aiPlayerCount);
      if (aiBtn) aiBtn.classList.add('selected');
    }
    this.updateAISetupDesc();
  }

  selectAICount(n) {
    this.aiPlayerCount = n;
    document.querySelectorAll('#aiCountGroup .btn').forEach(b => b.classList.remove('selected'));
    const btn = document.getElementById('ai' + n);
    if (btn) btn.classList.add('selected');
    this.updateAISetupDesc();
  }

  updateAISetupDesc() {
    const total = (this.humanPlayerCount || 1) + (this.aiPlayerCount || 3);
    const el = document.getElementById('aiSetupDesc');
    if (total > 4) {
      el.textContent = '⚠️ 共 ' + total + ' 人，超4人上限！';
      el.style.color = '#e74c3c';
    } else {
      el.textContent = this.humanPlayerCount + ' 人 + ' + this.aiPlayerCount + ' AI  = ' + total + ' 人';
      el.style.color = '';
    }
  }

  startGame() {
    if (this.gameMode === 'ai') {
      const total = (this.humanPlayerCount || 1) + (this.aiPlayerCount || 3);
      if (total > 4) {
        this.setActionText('总人数不能超过4人，请调整');
        return;
      }
      this.selectedPlayerCount = total;
    }
    CONFIG.PLAYERS = this.selectedPlayerCount;
    this.players = [];
    for (let i = 0; i < CONFIG.PLAYERS; i++) {
      this.players.push({
        id: i, color: CONFIG.COLORS[i], name: CONFIG.COLOR_NAMES[i],
        alive: true, emperorCityId: null, cities: [], factories: [],
        isHuman: this.gameMode === 'local' || i < this.humanPlayerCount
      });
    }

    // AI模式：创建AIPlayer
    if (this.gameMode === 'ai' || (this.gameMode === 'online' && this.onlineAICount > 0)) {
      this.aiPlayer = new AIPlayer(this);
      document.getElementById('aiLog').style.display = 'flex';
      this.aiLog('info', 'AI模式启动');
    }

    this._menuMapGenerated = false;
    this.generateMap();
    this.state = 'setup';
    this.setupPlayer = 0;

    document.getElementById('playerSelectOverlay').style.display = 'none';
    document.getElementById('topBar').style.display = '';
    document.getElementById('btnQuit').style.display = '';
    document.getElementById('bottomBar').style.display = '';
    document.getElementById('emperorPrompt').style.display = 'block';
    this.updateEmperorPrompt();

    // AI模式：如果第一个是AI则自动放置皇帝
    if (this.gameMode === 'ai' && !this.players[0].isHuman) {
      this.setActionText('AI 正在放置皇帝...');
      setTimeout(() => this.aiAutoSetup(), 600);
    } else {
      this.setActionText('请点击空城放置皇帝');
    }
    this.render();
  }

  // ==================== 地图编辑器 ====================
  openMapEditor() {
    this._savedMap = { cities: this.cities, mountains: this.mountains, rivers: this.rivers, state: this.state, camera: { ...this.camera } };
    this.cities = []; this.mountains = []; this.rivers = []; this.state = 'editing';
    this.camera = { x: 0, y: 0, zoom: 1 };
    this._edit = {
      cities: [], rivers: [], bridges: [], mountains: [], mountainCities: [],
      tool: 'city', drawing: false, history: []
    };
    document.getElementById('mapEditorOverlay').style.display = 'block';
    document.getElementById('editorBar').classList.add('show');
    document.getElementById('playerSelectOverlay').style.display = 'none';
    document.getElementById('topBar').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('canvasWrap').style.paddingBottom = '36px';
    this.setEditTool('city');
    this._editRender();
  }

  closeMapEditor() {
    document.getElementById('mapEditorOverlay').style.display = 'none';
    document.getElementById('editorBar').classList.remove('show');
    document.getElementById('canvasWrap').style.paddingBottom = '';
    document.getElementById('playerSelectOverlay').style.display = 'flex';
    if (this._savedMap) {
      this.cities = this._savedMap.cities;
      this.mountains = this._savedMap.mountains;
      this.rivers = this._savedMap.rivers;
      this.state = this._savedMap.state;
      this.camera = this._savedMap.camera || { x: 0, y: 0, zoom: 1 };
      this._savedMap = null;
    }
    this._edit = null;
  }

  setEditTool(tool) {
    this._edit.tool = tool;
    document.querySelectorAll('#editorBar .ed-tool').forEach(b => b.classList.remove('active'));
    const map = { city: 'btCity', river: 'btRiver', bridge: 'btBridge', mountain: 'btMtn', mountainCity: 'btMtnCity' };
    const el = document.getElementById(map[tool]);
    if (el) el.classList.add('active');
    const hints = { city: '点击放置城池', river: '长按拖拽画河流', bridge: '点击河流上放桥', mountain: '长按拖拽画山', mountainCity: '长按拖拽画山城' };
    document.getElementById('editHint').textContent = hints[tool] || '';
  }

  _editPush() { this._edit.history.push(JSON.parse(JSON.stringify({ cities: this._edit.cities, rivers: this._edit.rivers, bridges: this._edit.bridges, mountains: this._edit.mountains, mountainCities: this._edit.mountainCities }))); }

  undoEdit() {
    if (this._edit.history.length > 0) {
      const prev = this._edit.history.pop();
      Object.assign(this._edit, prev);
      this._editRender();
    }
  }

  clearEditMap() {
    if (confirm('确定清空地图？')) {
      this._editPush();
      this._edit.cities = []; this._edit.rivers = []; this._edit.bridges = [];
      this._edit.mountains = []; this._edit.mountainCities = [];
      this._editRender();
    }
  }

  saveCustomMap() {
    const e = this._edit;
    const totalEls = e.cities.length + e.rivers.length + e.bridges.length + e.mountains.length + e.mountainCities.length;
    if (totalEls < 2) { alert('请至少画2个元素再保存'); return; }

    // 转换为游戏格式
    const customCities = [];
    const customMountains = [];
    const customRivers = [];

    // 城池
    for (let i = 0; i < e.cities.length; i++) {
      customCities.push({ x: e.cities[i].x, y: e.cities[i].y });
    }
    // 河流（关联桥）
    for (const r of e.rivers) {
      if (r.points && r.points.length >= 2) {
        const pts = r.points.map(p => ({ x: p.x, y: p.y }));
        // 找出这条河上的桥
        const riverBridges = [];
        for (const b of e.bridges) {
          let minD = Infinity;
          for (let i = 0; i < pts.length - 1; i++) {
            const a = pts[i], b2 = pts[i + 1];
            const dx = b2.x - a.x, dy = b2.y - a.y, len = Math.hypot(dx, dy);
            if (len < 2) continue;
            const t = Math.max(0, Math.min(1, ((b.x - a.x) * dx + (b.y - a.y) * dy) / (len * len)));
            const px = a.x + t * dx, py = a.y + t * dy;
            minD = Math.min(minD, Math.hypot(b.x - px, b.y - py));
          }
          if (minD < 60) riverBridges.push({ x: b.x, y: b.y });
        }
        customRivers.push({ points: pts, bridges: riverBridges });
      }
    }
    // 山
    for (const m of e.mountains) {
      if (m.points && m.points.length >= 3) {
        customMountains.push({ points: m.points.map(p => ({ x: p.x, y: p.y })) });
      }
    }
    // 山城 = 山 + 城池（城池在山顶上方10px）
    for (const mc of e.mountainCities) {
      if (mc.points && mc.points.length >= 3) {
        customMountains.push({ points: mc.points.map(p => ({ x: p.x, y: p.y })) });
        const cx = mc.points.reduce((s, p) => s + p.x, 0) / mc.points.length;
        const topY = Math.min(...mc.points.map(p => p.y));
        customCities.push({ x: cx, y: topY + 8 });
      }
    }

    // 保存自定义地图数据（_applyCustomMap 会补全 id/hp/owner 等字段）
    this.customMap = { cities: customCities, rivers: customRivers, mountains: customMountains };
    // 清空 cities，让 startGame/startOnlineGame 调用 generateMap → _applyCustomMap 生成完整数据结构
    this.cities = [];
    this.mountains = [];
    this.rivers = [];
    document.getElementById('mapEditorOverlay').style.display = 'none';
    document.getElementById('editorBar').classList.remove('show');
    document.getElementById('canvasWrap').style.paddingBottom = '';
    document.getElementById('playerSelectOverlay').style.display = 'flex';
    if (this._savedMap) {
      this.state = this._savedMap.state;
      this.camera = this._savedMap.camera || { x: 0, y: 0, zoom: 1 };
      this._savedMap = null;
    }
    this._edit = null;

    // 提示
    if (document.getElementById('lobbyStatus')) {
      document.getElementById('lobbyStatus').textContent = '✓ 自定义地图已保存，将使用绘制的地图';
    }
  }

  _editRender() {
    // 画空白背景（重置变换，不受游戏摄像机影响）
    const ctx = this.ctx;
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0); // 重置所有变换
    const W = CONFIG.MAP_W, H = CONFIG.MAP_H;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#FCF9F2';
    ctx.fillRect(0, 0, W, H);
    // 淡色网格
    ctx.strokeStyle = 'rgba(180,170,150,0.3)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    // 画布边界
    ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 3;
    ctx.strokeRect(1, 1, W - 2, H - 2);
    const e = this._edit;
    // 统计
    const stats = document.getElementById('editStats');
    if (stats) stats.textContent = e.cities.length + '城 ' + e.rivers.length + '河 ' + e.bridges.length + '桥 ' + e.mountains.length + '山 ' + e.mountainCities.length + '山城';

    // 河流 — 与游戏一致
    for (const r of e.rivers) {
      if (r.points.length < 2) continue;
      ctx.strokeStyle = '#3366AA'; ctx.lineWidth = 44;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); ctx.moveTo(r.points[0].x, r.points[0].y);
      for (let i = 1; i < r.points.length; i++) ctx.lineTo(r.points[i].x, r.points[i].y);
      ctx.stroke();
      ctx.lineWidth = 36; ctx.strokeStyle = '#4488CC';
      ctx.beginPath(); ctx.moveTo(r.points[0].x, r.points[0].y);
      for (let i = 1; i < r.points.length; i++) ctx.lineTo(r.points[i].x, r.points[i].y);
      ctx.stroke();
    }

    // 桥 — 与游戏一致
    for (const b of e.bridges) {
      let angle = 0;
      for (const r of e.rivers) {
        if (r.points.length < 2) continue;
        for (let i = 0; i < r.points.length - 1; i++) {
          const a = r.points[i], b2 = r.points[i + 1];
          const dx = b2.x - a.x, dy = b2.y - a.y, len = Math.hypot(dx, dy);
          if (len < 2) continue;
          const t = Math.max(0, Math.min(1, ((b.x - a.x) * dx + (b.y - a.y) * dy) / (len * len)));
          const px = a.x + t * dx, py = a.y + t * dy;
          if (Math.hypot(b.x - px, b.y - py) < 60) { angle = Math.atan2(dy, dx) + Math.PI / 2; break; }
        }
        if (angle !== 0) break;
      }
      ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(angle);
      ctx.fillStyle = '#D4A76A'; ctx.fillRect(-50, -18, 100, 36);
      ctx.strokeStyle = '#4A3728'; ctx.lineWidth = 3;
      sketchRect(ctx, -50, -18, 100, 36, 3);
      ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 1.5;
      for (let lx = -40; lx <= 40; lx += 10) {
        ctx.beginPath(); ctx.moveTo(jitter(lx,1.5), jitter(-18,1.5)); ctx.lineTo(jitter(lx,1.5), jitter(18,1.5)); ctx.stroke();
      }
      ctx.restore();
    }

    // 山 — 使用游戏手绘风格（jitter + 三角峰）
    const drawEditMtn = (pts) => {
      if (pts.length < 3) return;
      ctx.strokeStyle = '#4A3728'; ctx.lineWidth = 2.5; ctx.fillStyle = '#FCF9F2';
      ctx.beginPath();
      ctx.moveTo(jitter(pts[0].x,2), jitter(pts[0].y,2));
      for (let i = 1; i < pts.length; i++) ctx.lineTo(jitter(pts[i].x,2), jitter(pts[i].y,2));
      ctx.closePath(); ctx.fill(); ctx.stroke();
      const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
      const my = Math.min(...pts.map(p => p.y));
      const mh = Math.max(...pts.map(p => p.y)) - my || 40;
      const peakBase = my + 5;     // 山顶线下方5px
      const peakTip = my - 5;      // 山顶上方5px（山峰尖）
      ctx.strokeStyle = '#4A3728'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(jitter(cx-10,1), jitter(peakBase,1));
      ctx.lineTo(jitter(cx,1), jitter(peakTip,1));
      ctx.lineTo(jitter(cx+10,1), jitter(peakBase,1));
      ctx.stroke();
    };
    for (const m of e.mountains) drawEditMtn(m.points);

    // 山城 — 山 + 山顶城池
    for (const mc of e.mountainCities) {
      drawEditMtn(mc.points);
      const cx = mc.points.reduce((s, p) => s + p.x, 0) / mc.points.length;
      const my = Math.min(...mc.points.map(p => p.y));
      // 城池嵌在山顶（游戏生成逻辑：y - h/2 + 15）
      const cy = Math.min(...mc.points.map(p => p.y)) + 8;
      this.drawCity(ctx, { x: cx, y: cy, owner: null, hp: 0, hasEmperor: false });
    }

    // 城池 — 调用游戏原生 drawCity
    for (const c of e.cities) {
      this.drawCity(ctx, { x: c.x, y: c.y, owner: null, hp: 0, hasEmperor: false });
    }
    // 当前正在绘制的路径预览
    if (e.drawing && e.drawPoints.length > 0) {
      const pts = e.drawPoints;
      ctx.save();
      ctx.globalAlpha = 0.7;
      if (e.tool === 'river') {
        ctx.strokeStyle = '#3388DD'; ctx.lineWidth = 44;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
      } else if (e.tool === 'mountain' || e.tool === 'mountainCity') {
        ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke(); ctx.setLineDash([]);
        // 显示当前位置
        const last = pts[pts.length - 1];
        ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(last.x, last.y, 5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }
    ctx.restore(); // 恢复游戏变换
  }

  _editPointerDown(pos) {
    this._edit.drawing = true;
    this._edit.drawPoints = [pos];
  }

  _editPointerMove(pos) {
    if (!this._edit.drawing) return;
    const t = this._edit.tool;
    if (t === 'river' || t === 'mountain' || t === 'mountainCity') {
      const last = this._edit.drawPoints[this._edit.drawPoints.length - 1];
      const dist = Math.hypot(pos.x - last.x, pos.y - last.y);
      if (dist > 6 || this._edit.drawPoints.length < 2) {
        if (this._edit.drawPoints.length < 2) this._edit.drawPoints.push(pos);
        else this._edit.drawPoints.push(pos);
        this._editRender();
      }
    }
  }

  _editPointerUp(pos) {
    if (!this._edit.drawing) return;
    this._edit.drawing = false;
    const t = this._edit.tool;
    const pts = this._edit.drawPoints;

    if (t === 'city') {
      this._edit.cities.push({ x: pos.x, y: pos.y });
    } else if (t === 'river') {
      if (pts.length < 2) {
        // 单点 → 自动生成一小段
        this._edit.rivers.push({ points: [{ x: pos.x - 60, y: pos.y }, { x: pos.x + 60, y: pos.y }] });
      } else {
        // 拖拽路径
        this._edit.rivers.push({ points: [...pts] });
      }
    } else if (t === 'bridge') {
      // 找最近的河流
      let bestR = null, bestT = Infinity, bestP = null;
      for (const r of this._edit.rivers) {
        if (r.points.length < 2) continue;
        for (let i = 0; i < r.points.length - 1; i++) {
          const a = r.points[i], b = r.points[i + 1];
          const dx = b.x - a.x, dy = b.y - a.y;
          const len = Math.hypot(dx, dy);
          if (len < 2) continue;
          const t = Math.max(0, Math.min(1, ((pos.x - a.x) * dx + (pos.y - a.y) * dy) / (len * len)));
          const px = a.x + t * dx, py = a.y + t * dy;
          const d = Math.hypot(pos.x - px, pos.y - py);
          if (d < bestT) { bestT = d; bestR = r; bestP = { x: px, y: py }; }
        }
      }
      if (bestR && bestT < 60) {
        this._edit.bridges.push({ x: bestP.x, y: bestP.y });
      } else {
        alert('请在河流附近点击放置桥');
      }
    } else if (t === 'mountain') {
      if (pts.length < 3) {
        // 不够3个点，自动生成圆形山
        const r = 60;
        const gen = [];
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
          gen.push({ x: pos.x + Math.cos(a) * (r - 10 + Math.random() * 20), y: pos.y + Math.sin(a) * (r - 10 + Math.random() * 20) });
        }
        this._edit.mountains.push({ points: gen });
      } else {
        this._edit.mountains.push({ points: [...pts] });
      }
    } else if (t === 'mountainCity') {
      if (pts.length < 3) {
        const r = 60;
        const gen = [];
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
          gen.push({ x: pos.x + Math.cos(a) * (r - 10 + Math.random() * 20), y: pos.y + Math.sin(a) * (r - 10 + Math.random() * 20) });
        }
        this._edit.mountainCities.push({ points: gen });
      } else {
        this._edit.mountainCities.push({ points: [...pts] });
      }
    }
    this._edit.drawPoints = [];
    this._editRender();
  }

  _applyCustomMap() {
    this.cities = [];
    this.mountains = [];
    this.rivers = [];

    // 城池
    let cityId = 0;
    for (const c of this.customMap.cities) {
      this.cities.push({ id: cityId++, x: c.x, y: c.y, owner: null, hp: 3, hasEmperor: false, isMountainCity: false, mountainId: undefined });
    }
    // 河流（包含桥）
    for (const r of this.customMap.rivers) {
      if (r.points && r.points.length >= 2) {
        this.rivers.push({ id: this.rivers.length, points: r.points.map(p => ({ x: p.x, y: p.y })), width: 55, bridges: r.bridges || [] });
      }
    }
    // 山 — 补全山体中心、高度、绳子属性
    let mtnId = 0;
    for (const m of this.customMap.mountains) {
      if (m.points && m.points.length >= 3) {
        const pts = m.points.map(p => ({ x: p.x, y: p.y }));
        const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
        const minY = Math.min(...pts.map(p => p.y));
        const maxY = Math.max(...pts.map(p => p.y));
        const h = maxY - minY || 40;
        const cy = minY + h / 2;
        this.mountains.push({ id: mtnId++, points: pts, x: cx, y: cy, h: h, hasRope: false });
      }
    }
    this.customMap = null;
  }

  generateMap() {
    if (this.customMap) {
      this._applyCustomMap();
      return;
    }
    this.cities = [];
    this.mountains = [];
    this.rivers = [];

    // ===== 1. 河流：边界到边界 =====
    for (let i = 0; i < CONFIG.RIVER_COUNT; i++) {
      let attempts = 0;
      while (attempts < 200) {
        attempts++;
        // 随机选两条不同的边
        const sides = [0, 1, 2, 3]; // 上,右,下,左
        const s1 = sides[Math.floor(Math.random() * 4)];
        let s2 = sides[Math.floor(Math.random() * 4)];
        while (s2 === s1) s2 = sides[Math.floor(Math.random() * 4)];
        const getBorderPoint = (side) => {
          switch (side) {
            case 0: return { x: randInt(100, CONFIG.MAP_W - 100), y: 0 };
            case 1: return { x: CONFIG.MAP_W, y: randInt(100, CONFIG.MAP_H - 100) };
            case 2: return { x: randInt(100, CONFIG.MAP_W - 100), y: CONFIG.MAP_H };
            case 3: return { x: 0, y: randInt(100, CONFIG.MAP_H - 100) };
          }
        };
        const start = getBorderPoint(s1);
        const end = getBorderPoint(s2);
        const midX = (start.x + end.x) / 2 + randInt(-150, 150);
        const midY = (start.y + end.y) / 2 + randInt(-150, 150);
        const len = Math.hypot(end.x - start.x, end.y - start.y);
        if (len > 300) {
          const river = {
            id: i, p0: start, p1: { x: (start.x + midX) / 2, y: (start.y + midY) / 2 },
            p2: { x: (midX + end.x) / 2, y: (midY + end.y) / 2 }, p3: end,
            width: rand(50, 65), bridges: []
          };
          // 生成1-2座桥
          const bridgeCount = 1 + Math.floor(Math.random() * 2);
          for (let b = 0; b < bridgeCount; b++) {
            const t = 0.25 + Math.random() * 0.5; // 在河中间50%范围
            const bpt = bezierPoint(t, river.p0, river.p1, river.p2, river.p3);
            river.bridges.push({ x: Math.round(bpt.x), y: Math.round(bpt.y), t: t });
          }
          this.rivers.push(river);
          break;
        }
      }
    }

    // ===== 2. 生成普通城池（避让河流和其他城池） =====
    let attempts = 0;
    while (this.cities.length < CONFIG.CITY_COUNT && attempts < 3000) {
      attempts++;
      const x = randInt(80, CONFIG.MAP_W - 80);
      const y = randInt(80, CONFIG.MAP_H - 120);
      let ok = true;
      for (const c of this.cities) {
        if (distToPoint(x, y, c.x, c.y) < CONFIG.MIN_DIST_CITY) { ok = false; break; }
      }
      if (!ok) continue;
      for (const river of this.rivers) {
        if (pointNearRiver(x, y, river, 55)) { ok = false; break; }
      }
      if (ok) {
        this.cities.push({ id: this.cities.length, x, y, hp: 1, owner: null, hasEmperor: false });
      }
    }

    // ===== 3. 生成山地（避让城池、河流、其他山地） =====
    attempts = 0;
    while (this.mountains.length < CONFIG.MOUNTAIN_COUNT && attempts < 2000) {
      attempts++;
      const x = randInt(120, CONFIG.MAP_W - 120);
      const y = randInt(100, CONFIG.MAP_H - 150);
      let ok = true;
      // 与城池保持距离
      for (const c of this.cities) {
        if (distToPoint(x, y, c.x, c.y) < 80) { ok = false; break; }
      }
      if (!ok) continue;
      // 与其他山地保持距离
      for (const m of this.mountains) {
        if (distToPoint(x, y, m.x, m.y) < CONFIG.MIN_DIST_MOUNTAIN) { ok = false; break; }
      }
      if (!ok) continue;

      const w = rand(80, 140), h = rand(60, 100);
      const points = [
        {x: x - w/2, y: y + h/2},
        {x: x - w/4, y: y - h/4},
        {x: x, y: y - h/2},
        {x: x + w/4, y: y - h/4},
        {x: x + w/2, y: y + h/2}
      ];
      // 山体的所有顶点必须远离河流
      if (mountainNearRiver(points, this.rivers, 35)) continue;

      // 额外检查山的内部采样点
      const extraPoints = [
        {x, y},                              // 中心
        {x: x - w/3, y: y + h/4},           // 左下内
        {x: x + w/3, y: y + h/4},           // 右下内
        {x: x - w/6, y: y - h/6},           // 左上内
        {x: x + w/6, y: y - h/6}            // 右上内
      ];
      if (mountainNearRiver(extraPoints, this.rivers, 35)) continue;

      const hasCity = Math.random() < 0.5;
      const mtn = { id: this.mountains.length, x, y, w, h, points, hasCity, cityId: null, hasRope: false, ropeOwner: null };
      if (hasCity) {
        const cx = x + randInt(-10, 10);
        const cy = y - h/2 + 15;
        // 山顶城必须避开河流
        let cityOnRiver = false;
        for (const river of this.rivers) {
          if (pointNearRiver(cx, cy, river, 50)) { cityOnRiver = true; break; }
        }
        if (!cityOnRiver) {
          const city = { id: this.cities.length, x: cx, y: cy, hp: 1, owner: null, hasEmperor: false, isMountainCity: true, mountainId: mtn.id };
          this.cities.push(city);
          mtn.cityId = city.id;
        }
      }
      this.mountains.push(mtn);
    }
  }

  bindEvents() {
    // 桌面端鼠标事件
    this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
    this.canvas.addEventListener('mousemove', e => this.onMouseMove(e));
    this.canvas.addEventListener('mouseup', e => this.onMouseUp(e));
    this.canvas.addEventListener('contextmenu', e => { e.preventDefault(); });
    this.canvas.addEventListener('wheel', e => this.onWheel(e), { passive: false });

    // 移动端触摸事件（所有设备都注册）
    this.canvas.addEventListener('touchstart', e => this.onTouchStart(e), { passive: false });
    this.canvas.addEventListener('touchmove', e => this.onTouchMove(e), { passive: false });
    this.canvas.addEventListener('touchend', e => this.onTouchEnd(e), { passive: false });
    this.canvas.addEventListener('touchcancel', e => this.onTouchEnd(e), { passive: false });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        this.setMode(null);
        this.selectedCannon = null;
        this.selectedCity = null;
        this.dragStart = null;
        this.dragCurrent = null;
        this.supplyDragPoints = null;
        this.render();
      }
    });
  }

  getMousePos(e) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = this.canvas.width / rect.width;
    const scaleY = this.canvas.height / rect.height;
    const sx = (e.clientX - rect.left) * scaleX;
    const sy = (e.clientY - rect.top) * scaleY;
    return { x: sx / this.camera.zoom + this.camera.x, y: sy / this.camera.zoom + this.camera.y };
  }

  // 移动端：获取触摸位置
  getTouchPos(e, touch) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = this.canvas.width / rect.width;
    const scaleY = this.canvas.height / rect.height;
    const sx = (touch.clientX - rect.left) * scaleX;
    const sy = (touch.clientY - rect.top) * scaleY;
    return { x: sx / this.camera.zoom + this.camera.x, y: sy / this.camera.zoom + this.camera.y };
  }

  // 移动端：触摸开始
  onTouchStart(e) {
    e.preventDefault();
    if (this._edit && e.touches.length === 1) { this._editPointerDown(this.getTouchPos(e, e.touches[0])); return; }
    // AI回合时禁止触摸操作（双指缩放除外）
    if (this.aiThinking && e.touches.length !== 2) return;
    // 联机：非自己回合禁止操作（双指缩放除外）
    if (this.gameMode === 'online' && this.currentPlayer !== this.myPlayerIndex && e.touches.length !== 2) return;

    // 双指缩放
    if (e.touches.length === 2) {
      this.pinchStartDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      this.pinchStartZoom = this.camera.zoom;
      this._lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      this._lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      return;
    }
    if (e.touches.length !== 1) return;

    const touch = e.touches[0];
    const pos = this.getTouchPos(e, touch);

    // 联机皇帝放置：标记此触摸，在 touchend 判断是否为轻触
    const isEmperorTap = (this.gameMode === 'online' && this._emperorClickHandler);
    if (isEmperorTap) {
      this.touchState = {
        active: true,
        startX: pos.x,
        startY: pos.y,
        startTime: Date.now(),
        isLongPress: false,
        touchId: touch.identifier,
        _emperorTap: true
      };
    }

    // 无模式或pan模式：单指平移
    if (!this.mode || this.mode === 'pan') {
      this.isPanning = true;
      this.panStart = { x: pos.x, y: pos.y };
      return;
    }

    this.touchState = {
      active: true,
      startX: pos.x,
      startY: pos.y,
      startTime: Date.now(),
      isLongPress: false,
      touchId: touch.identifier
    };

    // 清除之前的定时器
    if (this.longPressTimer) {
      clearTimeout(this.longPressTimer);
    }

    // 设置长按定时器
    this.longPressTimer = setTimeout(() => {
      if (this.touchState.active && !this.touchState.isLongPress) {
        this.touchState.isLongPress = true;
        this.onTouchLongPressStart();
      }
    }, this.LONG_PRESS_DURATION);
  }

  // 移动端：触摸移动
  onTouchMove(e) {
    e.preventDefault();
    if (this._edit && e.touches.length === 1) { this._editPointerMove(this.getTouchPos(e, e.touches[0])); return; }
    // 双指缩放
    if (e.touches.length === 2 && this.pinchStartDist > 0) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const oldZoom = this.camera.zoom;
      const newZoom = Math.max(0.15, Math.min(3, this.pinchStartZoom * (d / this.pinchStartDist)));
      const cx = CONFIG.MAP_W / 2, cy = CONFIG.MAP_H / 2;
      this.camera.x = cx / oldZoom + this.camera.x - cx / newZoom;
      this.camera.y = cy / oldZoom + this.camera.y - cy / newZoom;
      this.camera.zoom = newZoom;
      this.clampCamera();
      this.render();
      return;
    }
    // 单指平移
    if (this.isPanning && e.touches.length === 1) {
      const pos = this.getTouchPos(e, e.touches[0]);
      const dx = this.panStart.x - pos.x;
      const dy = this.panStart.y - pos.y;
      this.camera.x += dx;
      this.camera.y += dy;
      this.panStart = { x: pos.x, y: pos.y };
      this.clampCamera();
      this.render();
      return;
    }
    if (!this.touchState.active || this.touchState.touchId === null) return;

    // 找到对应的触摸点
    let touch = null;
    for (let i = 0; i < e.touches.length; i++) {
      if (e.touches[i].identifier === this.touchState.touchId) {
        touch = e.touches[i];
        break;
      }
    }
    if (!touch) return;

    const pos = this.getTouchPos(e, touch);
    const dx = pos.x - this.touchState.startX;
    const dy = pos.y - this.touchState.startY;
    const moveDist = Math.hypot(dx, dy);

    // 移动超过阈值，取消长按定时器
    if (moveDist > this.LONG_PRESS_MOVE_THRESHOLD) {
      if (this.longPressTimer) {
        clearTimeout(this.longPressTimer);
        this.longPressTimer = null;
      }
    }

    // 如果已经是长按模式，模拟右键拖拽
    if (this.touchState.isLongPress) {
      this.dragCurrent = pos;
      // 续粮线/引线模式：记录自由轨迹点
      if ((this.mode === 'supply' || this.mode === 'wire') && this.supplyDragPoints) {
        this.supplyDragPoints.push({ x: pos.x, y: pos.y });
      }
      this.render();
    }
  }

  // 移动端：触摸结束
  onTouchEnd(e) {
    e.preventDefault();
    if (this._edit) { this._editPointerUp(this.getTouchPos(e, e.changedTouches[0])); return; }
    // 联机皇帝放置：轻触（没拖动）时触发，拖动了就当平移
    if (this.touchState.active && this.touchState._emperorTap && this._emperorClickHandler) {
      const dur = Date.now() - this.touchState.startTime;
      const dx = this.panStart ? (this.touchState.startX - this.panStart.x) : 0;
      const dy = this.panStart ? (this.touchState.startY - this.panStart.y) : 0;
      if (dur < 500 && Math.abs(dx) < 15 && Math.abs(dy) < 15) {
        this.isPanning = false;
        this.touchState.active = false;
        this._emperorClickHandler({ x: this.touchState.startX, y: this.touchState.startY });
        return;
      }
    }

    // 结束平移或缩放
    if (this.isPanning) {
      this.isPanning = false;
      return;
    }
    this.pinchStartDist = 0;

    // 清除长按定时器
    if (this.longPressTimer) {
      clearTimeout(this.longPressTimer);
      this.longPressTimer = null;
    }

    if (!this.touchState.active) return;

    const duration = Date.now() - this.touchState.startTime;
    const pos = { x: this.touchState.startX, y: this.touchState.startY };

    // 如果是长按模式，结束拖拽
    if (this.touchState.isLongPress) {
      // 找到结束时的触摸点
      let touch = null;
      if (e.changedTouches.length > 0) {
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === this.touchState.touchId) {
            touch = e.changedTouches[i];
            break;
          }
        }
      }
      if (touch) {
        this.dragCurrent = this.getTouchPos(e, touch);
      }
      this.onTouchLongPressEnd();
    } else if (duration < this.LONG_PRESS_DURATION) {
      // 短按 = 左键点击
      if (this.state === 'setup') {
        this.handleSetupClick(pos);
      } else {
        this.handleLeftClick(pos);
      }
    }

    this.touchState = {
      active: false,
      startX: 0,
      startY: 0,
      startTime: 0,
      isLongPress: false,
      touchId: null
    };
  }

  // 长按开始 = 右键按下
  onTouchLongPressStart() {
    const pos = { x: this.touchState.startX, y: this.touchState.startY };
    if (this.state !== 'playing') return;

    if (this.mode === 'supply') {
      this.startSupplyDrag(pos);
    } else if (this.mode === 'wire') {
      this.startWireDrag(pos);
    } else {
      this.startTroopDeploy(pos);
    }
  }

  // 长按结束 = 右键松开
  onTouchLongPressEnd() {
    if (this.mode === 'supply') {
      this.finishSupplyDrag();
    } else if (this.mode === 'wire') {
      this.finishWireDrag();
    } else {
      this.finishTroopDeploy();
    }
  }

  onMouseDown(e) {
    const pos = this.getMousePos(e);
    if (this._edit) { this._editPointerDown(pos); return; }
    if (this.state === 'setup') {
      this.handleSetupClick(pos);
      return;
    }
    // 联机皇帝放置：记录位置，区分点击和拖拽
    if (this.gameMode === 'online' && this._emperorClickHandler && e.button === 0) {
      this._emperorDragStart = { x: pos.x, y: pos.y };
      return;
    }
    if (this.state !== 'playing') return;
    if (this.aiThinking) return; // AI回合时禁止玩家操作
    if (this.gameMode === 'online' && this.currentPlayer !== this.myPlayerIndex) return; // 联机：非自己回合

    // 移动地图模式：左键平移；中键始终可以平移
    if ((e.button === 0 && this.mode === 'pan') || e.button === 1) {
      // 检查是否在 drag 状态中（右键拖拽中）
      if (!this.dragStart) {
        this.isPanning = true;
        this.panStart = { x: pos.x, y: pos.y };
        this.canvas.style.cursor = 'grabbing';
        return;
      }
    }

    if (e.button === 2) {
      if (this.mode === 'supply') {
        this.startSupplyDrag(pos);
      } else if (this.mode === 'wire') {
        this.startWireDrag(pos);
      } else {
        this.startTroopDeploy(pos);
      }
    } else if (e.button === 0) {
      this.handleLeftClick(pos);
    }
  }

  onMouseMove(e) {
    const pos = this.getMousePos(e);
    if (this._edit) { this._editPointerMove(pos); return; }
    // 皇帝放置模式：检测拖拽，转为平移
    if (this._emperorDragStart && this._emperorClickHandler) {
      const dx = pos.x - this._emperorDragStart.x;
      const dy = pos.y - this._emperorDragStart.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        this.isPanning = true;
        this.panStart = { ...this._emperorDragStart };
        this._emperorDragStart = null;
      }
    }
    if (this.isPanning) {
