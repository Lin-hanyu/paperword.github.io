            src = this.findNearestDeploySource(me, p.fromX, p.fromY);
            if (src) this.aiLog('warn', '坐标不准，用最近出兵源 (' + Math.round(src.x) + ',' + Math.round(src.y) + ')');
          }
          if (src) {
            // 二次安全检查：确认出兵源属于当前AI
            if (src.origin && src.origin.owner !== undefined && src.origin.owner !== me) {
              this.aiLog('err', '出兵源不属于当前AI（owner=' + src.origin.owner + '，me=' + me + '），跳过');
              actionOk = false;
              break;
            }
            // 先试AI想要的方向（拉弓式：dragCurrent 放在源头反方向）
            const _aiAngle = Math.atan2(p.toY - src.y, p.toX - src.x);
            const _aiPull = _aiAngle + Math.PI;
            const _aiDist = Math.min(Math.hypot(p.toY - src.y, p.toX - src.x), 250);
            this.dragStart = src; this.dragCurrent = { x: src.x + Math.cos(_aiPull) * _aiDist, y: src.y + Math.sin(_aiPull) * _aiDist };
            let ok = this.finishTroopDeploy();
            if (ok) {
              endedTurn = true;
              this.aiLog('ok', '出兵成功 -> (' + Math.round(p.toX) + ',' + Math.round(p.toY) + ')');
            } else {
              // 被阻挡？绕圈尝试8个方向
              const dist = Math.hypot(p.toX - src.x, p.toY - src.y);
              const baseAngle = Math.atan2(p.toY - src.y, p.toX - src.x);
              let found = false;
              for (let k = 0; k < 8 && !found; k++) {
                const offset = ((k + 1) % 2 === 0 ? 1 : -1) * Math.floor((k + 1) / 2) * 0.6;
                const a = _aiAngle + offset;
                const tx = src.x + Math.cos(a) * Math.min(dist, 200);
                const ty = src.y + Math.sin(a) * Math.min(dist, 200);
                // 拉弓式：dragCurrent 放在反方向
                const _retryPull = Math.atan2(ty - src.y, tx - src.x) + Math.PI;
                const _retryDist = Math.hypot(ty - src.y, tx - src.x);
                this.dragStart = src; this.dragCurrent = { x: src.x + Math.cos(_retryPull) * _retryDist, y: src.y + Math.sin(_retryPull) * _retryDist };
                ok = this.finishTroopDeploy();
                if (ok) {
                  endedTurn = true; found = true;
                  this.aiLog('ok', '绕路出兵成功 -> (' + Math.round(tx) + ',' + Math.round(ty) + ')');
                }
              }
              if (!found) {
                actionOk = false;
                this.aiLog('err', '出兵失败（8方向均被阻挡）');
              }
            }
          } else {
            actionOk = false;
            this.aiLog('err', '找不到出兵源（可能被消灭）');
          }
          break;
        }
        case 'build_factory': {
          const fc = this.cities[p.cityId];
          if (fc && fc.owner === me) { this.buildFactoryAt(fc.x, fc.y); this.aiLog('ok', '建造工厂 城' + p.cityId); }
          else { actionOk = false; this.aiLog('err', '建造工厂失败: 城' + p.cityId + '不是己方'); }
          break;
        }
        case 'build_cannon': {
          this.buildCannonAt(p.x, p.y, me);
          this.aiLog('ok', '造大炮 (' + Math.round(p.x) + ',' + Math.round(p.y) + ')');
          break;
        }
        case 'place_cavalry': {
          this.buildCavalryAt(p.x, p.y, me);
          this.aiLog('ok', '部署骑兵 (' + Math.round(p.x) + ',' + Math.round(p.y) + ')');
          break;
        }
        case 'connect_wire': {
          const fac = this.factories[p.factoryId];
          const can = this.cannons[p.cannonId];
          if (fac && can && fac.owner === me) { this.buildWireBetween(fac, can); this.aiLog('ok', '连接引线 工厂' + p.factoryId + '->大炮' + p.cannonId); }
          else { actionOk = false; this.aiLog('err', '连接引线失败'); }
          break;
        }
        case 'end_turn': endedTurn = true; break;
      }
    } catch (e) { console.error('executeAIAction error:', e); actionOk = false; }
    if (endedTurn) this._aiTurnEnded = true;
    return actionOk;
  }

  findDeploySource(playerId, x, y) {
    // 城池
    for (const c of this.cities) {
      if (c.owner === playerId && Math.hypot(c.x - x, c.y - y) < 35) {
        return { x: c.x, y: c.y, origin: c, originType: 'city', originTroopId: null, isTroopEnd: false };
      }
    }
    // 工厂
    for (const f of this.factories) {
      if (f.owner === playerId && Math.hypot(f.x - x, f.y - y) < 30) {
        return { x: f.x, y: f.y, origin: f, originType: 'factory', originTroopId: null, isTroopEnd: false };
      }
    }
    // 船
    for (const s of this.ships) {
      const sx = s.spawnX || s.x, sy = s.spawnY || s.y;
      if (s.owner === playerId && Math.hypot(sx - x, sy - y) < 25) {
        const hasTroop = this.troops.some(t => t.shipId === s.id && t.owner === playerId);
        if (hasTroop) continue;
        return { x: sx, y: sy, origin: { x: sx, y: sy, id: s.id }, originType: 'ship', originTroopId: null, isTroopEnd: false };
      }
    }
    // 骑兵
    for (const cv of this.cavalryUnits) {
      if (cv.owner === playerId && !cv.hasTroop && Math.hypot(cv.spawnX - x, cv.spawnY - y) < 20) {
        return { x: cv.spawnX, y: cv.spawnY, origin: { x: cv.spawnX, y: cv.spawnY, id: cv.id }, originType: 'cavalryUnit', originTroopId: null, isTroopEnd: false };
      }
    }
    // 兵线（延伸/分支）
    for (const t of this.troops) {
      if (t.owner !== playerId || t.hp <= 0) continue;
      for (let i = 0; i < t.points.length; i++) {
        if (Math.hypot(t.points[i].x - x, t.points[i].y - y) < 15) {
          return { x: t.points[i].x, y: t.points[i].y, origin: { x: t.points[i].x, y: t.points[i].y }, originType: 'troop', originTroopId: t.id, isTroopEnd: (i === t.points.length - 1) };
        }
      }
    }
    return null;
  }

  findNearestDeploySource(playerId, x, y) {
    let best = null, bestDist = Infinity;
    // 城池
    for (const c of this.cities) {
      if (c.owner === playerId) {
        const d = Math.hypot(c.x - x, c.y - y);
        if (d < bestDist) { bestDist = d; best = { x: c.x, y: c.y, origin: c, originType: 'city', originTroopId: null, isTroopEnd: false }; }
      }
    }
    // 工厂
    for (const f of this.factories) {
      if (f.owner === playerId) {
        const d = Math.hypot(f.x - x, f.y - y);
        if (d < bestDist) { bestDist = d; best = { x: f.x, y: f.y, origin: f, originType: 'factory', originTroopId: null, isTroopEnd: false }; }
      }
    }
    // 骑兵
    for (const cv of this.cavalryUnits) {
      if (cv.owner === playerId && !cv.hasTroop) {
        const d = Math.hypot(cv.spawnX - x, cv.spawnY - y);
        if (d < bestDist) { bestDist = d; best = { x: cv.spawnX, y: cv.spawnY, origin: { x: cv.spawnX, y: cv.spawnY, id: cv.id }, originType: 'cavalryUnit', originTroopId: null, isTroopEnd: false }; }
      }
    }
    // 船
    for (const s of this.ships) {
      if (s.owner === playerId) {
        const hasTroop = this.troops.some(t => t.shipId === s.id && t.owner === playerId);
        if (hasTroop) continue;
        const sx = s.spawnX || s.x, sy = s.spawnY || s.y;
        const d = Math.hypot(sx - x, sy - y);
        if (d < bestDist) { bestDist = d; best = { x: sx, y: sy, origin: { x: sx, y: sy, id: s.id }, originType: 'ship', originTroopId: null, isTroopEnd: false }; }
      }
    }
    // 兵线
    for (const t of this.troops) {
      if (t.owner !== playerId || t.hp <= 0) continue;
      for (let i = 0; i < t.points.length; i++) {
        const d = Math.hypot(t.points[i].x - x, t.points[i].y - y);
        if (d < bestDist) { bestDist = d; best = { x: t.points[i].x, y: t.points[i].y, origin: { x: t.points[i].x, y: t.points[i].y }, originType: 'troop', originTroopId: t.id, isTroopEnd: (i === t.points.length - 1) }; }
      }
    }
    return best;
  }

  buildFactoryAt(x, y) {
    const player = this.players[this.currentPlayer];
    // 找最近的己方城池关联cityId
    let nearestCity = null, nearestDist = Infinity;
    for (const c of this.cities) {
      if (c.owner === this.currentPlayer) {
        const d = Math.hypot(c.x - x, c.y - y);
        if (d < nearestDist) { nearestDist = d; nearestCity = c; }
      }
    }
    const cityId = nearestCity ? nearestCity.id : null;
    const id = this.factories.length;
    this.factories.push({ id, cityId, x: x, y: y - 5, owner: this.currentPlayer, hp: CONFIG.FACTORY_HP });
    player.factories.push(id);
    this.factoryId = id + 1;
    this.setActionText('工厂建造完成');
  }

  buildCannonAt(x, y, owner) {
    const id = this.cannons.length;
    this.cannons.push({ id, owner, x, y, hp: CONFIG.CANNON_HP });
    this.cannonId = id + 1;
    this.setActionText('大炮建造完成');
  }

  buildCavalryAt(x, y, owner) {
    const id = this.cavalryUnits.length;
    this.cavalryUnits.push({ id, owner, x, y, spawnX: x, spawnY: y + 16, hp: CONFIG.CAVALRY_UNIT_HP });
    this.cavalryId = id + 1;
    this.setActionText('骑兵部署完成');
  }

  buildWireBetween(fac, can) {
    const id = this.wires.length;
    this.wires.push({ id, factoryId: fac.id, cannonId: can.id, owner: fac.owner, points: [{ x: fac.x, y: fac.y }, { x: can.x, y: can.y }], hp: CONFIG.WIRE_HP });
    this.wireId = id + 1;
    this.setActionText('引线连接完成');
  }

  // 消耗指定大炮的引线血量（大炮攻击一次，引线掉1血）
  _consumeWireHp(cannonId) {
    for (let i = this.wires.length - 1; i >= 0; i--) {
      const w = this.wires[i];
      if (w.cannonId === cannonId && w.owner === this.currentPlayer) {
        w.hp -= 1;
        if (w.hp <= 0) {
          this.wires.splice(i, 1);
          this.setActionText(this.actionText + ' 引线已断！');
        } else {
          this.setActionText(this.actionText + ` 引线剩余血量: ${w.hp}`);
        }
        break;
      }
    }
  }
}

// ==================== AI 对战系统 ====================

const SYSTEM_PROMPT = '你是纸上江山游戏的AI玩家。你可以每回合执行多个操作（2-5个），先攻击后建设。\n\n' +
'## 核心规则\n' +
'- 每个己方城池最多同时存在3条兵线\n' +
'- 地图有河流（蓝色），兵线不能穿过河流，必须走桥过河\n' +
'- 4个玩家混战，皇帝城被攻占=该国灭亡\n\n' +
'## 战力数据\n' +
'- 普通兵线：HP=2 ATK=1\n' +
'- 骑兵兵线：HP=2 ATK=3（攻城利器！从骑兵单位出兵）\n' +
'- 大炮：HP=1 ATK=3 射程70（需引线连接工厂）\n' +
'- 骑兵单位：HP=3（部署在工厂旁）\n\n' +
'## 每回合必须做的事（按顺序，允许多个action）\n\n' +
'1. **出兵攻击**：从己方兵线<3的城池出兵！优先攻击敌方皇帝城和HP低的城\n' +
'2. **建工厂**：如果己方城池没有工厂→立即建工厂(build_factory)\n' +
'3. **造骑兵**：有工厂没骑兵→部署骑兵(place_cavalry)，然后从骑兵出兵攻\n' +
'4. **造大炮**：有工厂且敌人兵线逼近→造大炮(build_cannon)并连引线(connect_wire)，开炮(cannon_attack)\n' +
'5. **多方向进攻**：从不同城池出兵，让敌人无法防守\n\n' +
'## 可用指令\n\n' +
'{"action":"deploy_troop","params":{"fromX":100,"fromY":200,"toX":300,"toY":250}} 出兵\n' +
'{"action":"build_factory","params":{"cityId":3}} 在指定城池建工厂\n' +
'{"action":"place_cavalry","params":{"x":410,"y":310}} 在工厂旁部署骑兵\n' +
'{"action":"build_cannon","params":{"x":400,"y":300}} 在工厂旁造大炮\n' +
'{"action":"connect_wire","params":{"factoryId":0,"cannonId":0}} 工厂连大炮\n' +
'{"action":"cannon_attack","params":{"targetX":300,"targetY":250}} 大炮开火\n\n' +
'## 返回格式\n' +
'{"thinking":"1-2句分析","actions":[{"action":"deploy_troop","params":{...}},{"action":"build_factory","params":{...}}]}\n' +
'- actions数组放2-5个action！先出兵再建设！\n' +
'- 坐标用整数，严格JSON格式';

class AIPlayer {
  constructor(game) {
    this.game = game;
    this.apiUrl = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
    this.apiKey = '0f4743056ece4e74bd0728235b3ed2e1.DyInYf9FR1pZe7tT';
    this.model = 'glm-4-flash';
  }

  async getActions() {
    const stateText = this.serializeState();
    this.game.aiLog('info', '正在调用API...');
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);
      const resp = await fetch(this.apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + this.apiKey
        },
        body: JSON.stringify({
          model: this.model,
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            { role: 'user', content: '当前游戏状态：\n' + stateText + '\n请返回你的操作JSON。' }
          ],
          temperature: 0.7,
          max_tokens: 1024
        }),
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      if (!resp.ok) {
        const errText = await resp.text().catch(() => '');
        this.game.aiLog('err', 'API错误 ' + resp.status + ': ' + errText.substring(0, 60));
        throw new Error('API ' + resp.status);
      }
      const data = await resp.json();
      const text = data.choices[0].message.content;
      this.game.aiLog('info', 'AI回复: ' + text.substring(0, 80));
      const act = this.parseActions(text);
      if (!act || act.length === 0 || act[0].action === 'end_turn') {
        throw new Error('AI返回end_turn或空，重试');
      }
      return act;
    } catch (err) {
      this.game.aiLog('err', '调用失败: ' + err.message);
      return null;
    }
  }

  serializeState() {
    const g = this.game;
    const pid = g.currentPlayer;
    const p = g.players[pid];
    let s = '第' + g.turn + '轮 | ' + p.name + '(玩家' + (pid+1) + ')的回合\n\n';

    s += '=== 城池 ===\n';
    for (const c of g.cities) {
      const owner = c.owner !== null ? CONFIG.COLOR_NAMES[c.owner] : '无';
      s += '[城' + c.id + '] (' + Math.round(c.x) + ',' + Math.round(c.y) + ') HP:' + c.hp + ' ' + owner;
      if (c.hasEmperor) s += ' [皇帝]';
      // 统计该城现有兵线数
      const troopCount = g.troops.filter(t => {
        if (t.hp <= 0 || t.owner !== c.owner) return false;
        const first = t.points[0];
        return Math.hypot(first.x - c.x, first.y - c.y) < 5;
      }).length;
      if (c.owner !== null) s += ' 兵线:' + troopCount + '/3';
      const fac = g.factories.find(f => f.cityId === c.id && f.owner === c.owner);
      if (fac) s += ' [工厂ID' + fac.id + ']';
      s += '\n';
    }

    s += '\n=== 己方 (' + p.name + ') ===\n';
    s += '皇帝城: ' + (p.emperorCityId !== null ? '城' + p.emperorCityId : '无') + '\n';
    s += '城池: [' + p.cities.join(',') + '] \n';
    s += '可出兵的城（兵线<3）: ';
    const canDeployCities = g.cities.filter(c => {
      if (c.owner !== pid || c.hp <= 0) return false;
      const cnt = g.troops.filter(t => {
        if (t.hp <= 0 || t.owner !== pid) return false;
        return Math.hypot(t.points[0].x - c.x, t.points[0].y - c.y) < 5;
      }).length;
      return cnt < 3;
    });
    s += (canDeployCities.length > 0 ? canDeployCities.map(c => '城' + c.id + '(' + Math.round(c.x) + ',' + Math.round(c.y) + ')').join(', ') : '无') + '\n';

    s += '兵线:\n';
    g.troops.filter(t => t.owner === pid && t.hp > 0).forEach(t => {
      const s0 = t.points[0], e0 = t.points[t.points.length - 1];
      s += '  [' + t.type + '] HP:' + t.hp + ' ATK:' + t.atk + ' (' + Math.round(s0.x) + ',' + Math.round(s0.y) + ')->(' + Math.round(e0.x) + ',' + Math.round(e0.y) + ')\n';
    });
    const myFacs = g.factories.filter(f => f.owner === pid);
    s += '工厂: ' + (myFacs.map(f => 'ID' + f.id + '(城' + f.cityId + ',坐标' + Math.round(f.x) + ',' + Math.round(f.y) + ')').join(', ') || '无') + '\n';
    const myCannons = g.cannons.filter(c => c.owner === pid);
    s += '大炮: ' + (myCannons.map(c => {
      // 检查引线连接
      const wire = g.wires.find(w => w.owner === pid && w.hp > 0 && w.points.length >= 2);
      const hasWire = wire && Math.hypot(wire.points[0].x - myFacs[0]?.x, wire.points[0].y - myFacs[0]?.y) < 30;
      return 'ID' + c.id + '(' + Math.round(c.x) + ',' + Math.round(c.y) + ')HP' + c.hp;
    }).join(', ') || '无') + '\n';
    s += '骑兵单位: ' + g.cavalryUnits.filter(c => c.owner === pid && !c.hasTroop).map(c => 'ID' + c.id + '(' + Math.round(c.spawnX) + ',' + Math.round(c.spawnY) + ')HP' + c.hp).join(', ') || '无\n';

    s += '\n=== 敌方 ===\n';
    for (let i = 0; i < g.players.length; i++) {
      if (i === pid || !g.players[i].alive) continue;
      const ep = g.players[i];
      s += ep.name + ': ' + ep.cities.length + '城 ';
      s += g.troops.filter(t => t.owner === i && t.hp > 0).length + '线 ';
      s += g.factories.filter(f => f.owner === i).length + '厂 ';
      s += g.cannons.filter(c => c.owner === i).length + '炮 ';
      s += g.cavalryUnits.filter(c => c.owner === i).length + '骑\n';
      g.cities.filter(c => c.owner === i).forEach(c => {
        s += '  城' + c.id + '(' + Math.round(c.x) + ',' + Math.round(c.y) + ') HP:' + c.hp + (c.hasEmperor ? ' [皇帝]' : '') + '\n';
      });
      // 敌方兵线详情（帮助AI判断威胁）
      const enemyTroops = g.troops.filter(t => t.owner === i && t.hp > 0);
      if (enemyTroops.length > 0) {
        s += '  敌方兵线: ';
        s += enemyTroops.map(t => {
          const e = t.points[t.points.length - 1];
          return '[' + t.type + ']' + Math.round(e.x) + ',' + Math.round(e.y);
        }).join(' | ');
        s += '\n';
      }
    }

    s += '\n=== 河流与桥梁 ===\n';
    g.rivers.forEach(r => {
      s += '河' + r.id + ': ' + (r.bridges || []).map(b => '桥(' + Math.round(b.x) + ',' + Math.round(b.y) + ')').join(' ') + '\n';
    });

    s += '\n=== 引线 ===\n';
    g.wires.forEach(w => {
      if (w.hp <= 0) return;
      const s0 = w.points[0], e0 = w.points[w.points.length - 1];
      s += '[' + CONFIG.COLOR_NAMES[w.owner] + '] (' + Math.round(s0.x) + ',' + Math.round(s0.y) + ')->(' + Math.round(e0.x) + ',' + Math.round(e0.y) + ') HP:' + w.hp + '\n';
    });

    return s;
  }

  parseActions(text) {
    // 策略1: 找actions数组
    const m1 = text.match(/"actions"\s*:\s*(\[[^\]]*\])/);
    if (m1) {
      const partial = '{' + m1[0] + '}';
      try {
        const d = JSON.parse(partial);
        const v = this._validateActions(d.actions);
        if (v) return v;
      } catch(e) {}
    }
    // 策略2: 非贪婪整JSON
    const m2 = text.match(/\{[\s\S]*?\}/);
    if (m2) {
      try {
        const d = JSON.parse(m2[0]);
        if (d.thinking) console.log('[AI]', d.thinking);
        const v = this._validateActions(d.actions);
        if (v) return v;
      } catch(e) {}
    }
    // 策略3: 直接尝试解析整个文本（可能是纯JSON）
    try {
      const d = JSON.parse(text.trim());
      if (d.thinking) console.log('[AI]', d.thinking);
      const v = this._validateActions(d.actions);
      if (v) return v;
    } catch(e) {}
    return null;
  }

  _validateActions(actions) {
    if (!actions || !Array.isArray(actions) || actions.length === 0) return null;
    // AI不允许end_turn
    const noEnd = actions.filter(a => a && a.action !== 'end_turn');
    if (noEnd.length === 0) return null;
    const valid = ['deploy_troop', 'build_factory', 'build_cannon', 'place_cavalry',
      'connect_wire', 'connect_supply', 'build_rope', 'build_dock', 'build_ship',
      'move_emperor', 'burn_rope', 'cannon_attack'];
    const filtered = noEnd.filter(a => valid.includes(a.action));
    if (filtered.length === 0) return null;
    // 每回合只返回一个action：优先deploy_troop，其次build操作
    const deploy = filtered.find(a => a.action === 'deploy_troop');
    if (deploy) return [deploy];
    // 没有出兵指令，执行第一个build
    return [filtered[0]];
  }
}

const game = new Game();
</script>
